Diagram:
  DefinitionFiles:
    - Type: URL
      Url: "https://raw.githubusercontent.com/awslabs/diagram-as-code/main/definitions/definition-for-aws-icons-light.yaml"

  # Vietnam Air Quality Pipeline — ap-southeast-1
  # Generated with: awsdac docs/architecture.yaml -o docs/architecture.png -f

  Resources:

    Canvas:
      Type: AWS::Diagram::Canvas
      Direction: horizontal
      Children:
        - ExternalCol
        - AWSCloud
        - UserCol

    # ── External (left column) ────────────────────────────────────────────────────
    ExternalCol:
      Type: AWS::Diagram::HorizontalStack
      Children:
        - OpenAQArchive
        - OpenAQAPI
        - OpenMeteo

    OpenAQArchive:
      Type: AWS::Diagram::Resource
      Preset: "Amazon Simple Storage Service (Amazon S3)"
      Title: "OpenAQ S3 Archive\nus-east-1 · 21 stations"

    OpenAQAPI:
      Type: AWS::Diagram::Resource
      Preset: User
      Title: "OpenAQ REST API v3"

    OpenMeteo:
      Type: AWS::Diagram::Resource
      Preset: User
      Title: "Open-Meteo ERA5"

    # ── AWS Cloud (center) ────────────────────────────────────────────────────────
    AWSCloud:
      Type: AWS::Diagram::Cloud
      Direction: vertical
      Preset: AWSCloudNoLogo
      Children:
        - MainRegion
        - BillingRegion

    MainRegion:
      Type: AWS::Region
      Title: "ap-southeast-1 (fully managed — no VPC)"
      Direction: vertical
      Children:
        - ScheduleRow
        - IngestRow
        - StorageRow
        - QueryRow
        - ServingRow
        - DashboardRow
        - MonitorRow

    BillingRegion:
      Type: AWS::Region
      Title: "us-east-1"
      Direction: vertical
      Children:
        - BillingRow

    # ── Scheduling ────────────────────────────────────────────────────────────────
    ScheduleRow:
      Type: AWS::Diagram::HorizontalStack
      Children:
        - EventBridge
        - SecretsManager

    EventBridge:
      Type: AWS::Diagram::Resource
      Preset: "Amazon EventBridge"
      Title: "EventBridge Scheduler\n6 rules"

    SecretsManager:
      Type: AWS::Diagram::Resource
      Preset: "AWS Secrets Manager"
      Title: "Secrets Manager\nopenaq/api_key"

    # ── Ingestion ─────────────────────────────────────────────────────────────────
    IngestRow:
      Type: AWS::Diagram::HorizontalStack
      Children:
        - BatchLambda
        - StreamingLambda
        - WeatherLambda

    BatchLambda:
      Type: AWS::Diagram::Resource
      Preset: "AWS Lambda"
      Title: "batch_sync\n512 MB · 900 s"

    StreamingLambda:
      Type: AWS::Diagram::Resource
      Preset: "AWS Lambda"
      Title: "streaming_producer\n256 MB · 120 s"

    WeatherLambda:
      Type: AWS::Diagram::Resource
      Preset: "AWS Lambda"
      Title: "weather_ingest\n256 MB · 300 s"

    # ── Storage ───────────────────────────────────────────────────────────────────
    StorageRow:
      Type: AWS::Diagram::HorizontalStack
      Children:
        - S3DataLake
        - KinesisPipeline
        - SQSDLQ

    S3DataLake:
      Type: AWS::Diagram::Resource
      Preset: "Amazon Simple Storage Service (Amazon S3)"
      Title: "S3 openaq-pipeline\nbatch · stream · weather"

    KinesisPipeline:
      Type: AWS::Diagram::Resource
      Preset: "Amazon Kinesis"
      Title: "Kinesis Data Streams\n→ Firehose → raw/stream/"

    SQSDLQ:
      Type: AWS::Diagram::Resource
      Preset: "Amazon Simple Queue Service (Amazon SQS)"
      Title: "SQS DLQ\nopenaq_streaming_dlq"

    # ── Query & Transform ─────────────────────────────────────────────────────────
    QueryRow:
      Type: AWS::Diagram::HorizontalStack
      Children:
        - GlueCatalog
        - Athena
        - CodeBuild

    GlueCatalog:
      Type: AWS::Diagram::Resource
      Preset: "AWS Glue"
      Title: "Glue Data Catalog\npartition projection"

    Athena:
      Type: AWS::Diagram::Resource
      Preset: "Amazon Athena"
      Title: "Athena\nopenaq_workgroup"

    CodeBuild:
      Type: AWS::Diagram::Resource
      Preset: "AWS CodeBuild"
      Title: "CodeBuild · dbt\n17 models · 85 tests"

    # ── Serving ───────────────────────────────────────────────────────────────────
    ServingRow:
      Type: AWS::Diagram::HorizontalStack
      Children:
        - AQIService
        - ForecastService

    AQIService:
      Type: AWS::Diagram::Resource
      Preset: "Amazon API Gateway"
      Title: "aqi_api + API Gateway\nGeoJSON · CORS"

    ForecastService:
      Type: AWS::Diagram::Resource
      Preset: "AWS Lambda"
      Title: "forecast_generate (ECR)\nSARIMA 7-day PM2.5"

    # ── Dashboards ────────────────────────────────────────────────────────────────
    DashboardRow:
      Type: AWS::Diagram::HorizontalStack
      Children:
        - S3Dashboard
        - QuickSightDashboard

    S3Dashboard:
      Type: AWS::Diagram::Resource
      Preset: "Amazon Simple Storage Service (Amazon S3)"
      Title: "S3 Static Site\ndashboard/index.html"

    QuickSightDashboard:
      Type: AWS::Diagram::Resource
      Preset: "Amazon QuickSight"
      Title: "Amazon QuickSight\nanalytics dashboard"

    # ── Monitoring ────────────────────────────────────────────────────────────────
    MonitorRow:
      Type: AWS::Diagram::HorizontalStack
      Children:
        - CompletenessLambda
        - MonitoringStack

    CompletenessLambda:
      Type: AWS::Diagram::Resource
      Preset: "AWS Lambda"
      Title: "completeness_check\nMissingStations metric"

    MonitoringStack:
      Type: AWS::Diagram::Resource
      Preset: "Amazon CloudWatch"
      Title: "CloudWatch + SNS\n4 alarms · openaq_alerts"

    # ── Billing us-east-1 ─────────────────────────────────────────────────────────
    BillingRow:
      Type: AWS::Diagram::HorizontalStack
      Children:
        - BillingMonitor

    BillingMonitor:
      Type: AWS::Diagram::Resource
      Preset: "Amazon CloudWatch"
      Title: "CloudWatch + SNS\nBilling > $8/month"

    # ── End User (right column) ───────────────────────────────────────────────────
    UserCol:
      Type: AWS::Diagram::HorizontalStack
      Children:
        - EndUser

    EndUser:
      Type: AWS::Diagram::Resource
      Preset: User
      Title: "End User\nbrowser"

  Links:

    # ── External → Ingestion (E→W: left panel into AWS) ──────────────────────────
    - Source: OpenAQArchive
      SourcePosition: E
      Target: BatchLambda
      TargetPosition: W
      TargetArrowHead:
        Type: Open

    - Source: OpenAQAPI
      SourcePosition: E
      Target: StreamingLambda
      TargetPosition: W
      TargetArrowHead:
        Type: Open

    - Source: OpenMeteo
      SourcePosition: E
      Target: WeatherLambda
      TargetPosition: W
      TargetArrowHead:
        Type: Open

    # ── EventBridge triggers (orange) ─────────────────────────────────────────────
    - Source: EventBridge
      SourcePosition: S
      Target: BatchLambda
      TargetPosition: N
      TargetArrowHead:
        Type: Open
      LineColor: "rgba(232,140,0,255)"

    - Source: EventBridge
      SourcePosition: S
      Target: StreamingLambda
      TargetPosition: N
      TargetArrowHead:
        Type: Open
      LineColor: "rgba(232,140,0,255)"

    - Source: EventBridge
      SourcePosition: S
      Target: WeatherLambda
      TargetPosition: N
      TargetArrowHead:
        Type: Open
      LineColor: "rgba(232,140,0,255)"

    - Source: EventBridge
      SourcePosition: S
      Target: CodeBuild
      TargetPosition: N
      TargetArrowHead:
        Type: Open
      LineColor: "rgba(232,140,0,255)"

    - Source: EventBridge
      SourcePosition: S
      Target: ForecastService
      TargetPosition: N
      TargetArrowHead:
        Type: Open
      LineColor: "rgba(232,140,0,255)"

    - Source: EventBridge
      SourcePosition: S
      Target: CompletenessLambda
      TargetPosition: N
      TargetArrowHead:
        Type: Open
      LineColor: "rgba(232,140,0,255)"

    # ── Secrets (red) ─────────────────────────────────────────────────────────────
    - Source: SecretsManager
      SourcePosition: S
      Target: StreamingLambda
      TargetPosition: N
      TargetArrowHead:
        Type: Open
      LineColor: "rgba(221,0,49,255)"

    # ── Ingestion → Storage ───────────────────────────────────────────────────────
    - Source: BatchLambda
      SourcePosition: S
      Target: S3DataLake
      TargetPosition: N
      TargetArrowHead:
        Type: Open

    - Source: StreamingLambda
      SourcePosition: S
      Target: KinesisPipeline
      TargetPosition: N
      TargetArrowHead:
        Type: Open

    - Source: StreamingLambda
      SourcePosition: S
      Target: SQSDLQ
      TargetPosition: N
      TargetArrowHead:
        Type: Open
      LineColor: "rgba(221,0,49,255)"

    - Source: WeatherLambda
      SourcePosition: S
      Target: S3DataLake
      TargetPosition: N
      TargetArrowHead:
        Type: Open

    - Source: KinesisPipeline
      SourcePosition: W
      Target: S3DataLake
      TargetPosition: E
      TargetArrowHead:
        Type: Open

    # ── Storage → Glue → Athena ───────────────────────────────────────────────────
    - Source: S3DataLake
      SourcePosition: S
      Target: GlueCatalog
      TargetPosition: N
      TargetArrowHead:
        Type: Open

    - Source: GlueCatalog
      SourcePosition: E
      Target: Athena
      TargetPosition: W
      TargetArrowHead:
        Type: Open
      Labels:
        SourceRight:
          Title: "partition projection"

    # ── Athena ↔ dbt ──────────────────────────────────────────────────────────────
    - Source: Athena
      SourcePosition: E
      Target: CodeBuild
      TargetPosition: W
      TargetArrowHead:
        Type: Open

    - Source: CodeBuild
      SourcePosition: W
      Target: Athena
      TargetPosition: E
      TargetArrowHead:
        Type: Open
      Labels:
        TargetRight:
          Title: "openaq_mart"

    # ── Athena → Serving ──────────────────────────────────────────────────────────
    - Source: Athena
      SourcePosition: S
      Target: AQIService
      TargetPosition: N
      TargetArrowHead:
        Type: Open
      Labels:
        SourceLeft:
          Title: "mart_daily_aqi"

    - Source: Athena
      SourcePosition: S
      Target: ForecastService
      TargetPosition: N
      TargetArrowHead:
        Type: Open
      Labels:
        SourceRight:
          Title: "mart_lagged_features"

    # ── Serving → Dashboards ─────────────────────────────────────────────────────
    - Source: AQIService
      SourcePosition: S
      Target: S3Dashboard
      TargetPosition: N
      TargetArrowHead:
        Type: Open

    - Source: Athena
      SourcePosition: S
      Target: QuickSightDashboard
      TargetPosition: N
      TargetArrowHead:
        Type: Open

    # ── Dashboards → User (E→W: AWS into right panel) ────────────────────────────
    - Source: S3Dashboard
      SourcePosition: E
      Target: EndUser
      TargetPosition: W
      TargetArrowHead:
        Type: Open

    - Source: QuickSightDashboard
      SourcePosition: E
      Target: EndUser
      TargetPosition: W
      TargetArrowHead:
        Type: Open

    # ── Monitoring ────────────────────────────────────────────────────────────────
    - Source: ForecastService
      SourcePosition: S
      Target: MonitoringStack
      TargetPosition: N
      TargetArrowHead:
        Type: Open

    - Source: CompletenessLambda
      SourcePosition: E
      Target: MonitoringStack
      TargetPosition: W
      TargetArrowHead:
        Type: Open
