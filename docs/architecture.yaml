Diagram:
  DefinitionFiles:
    - Type: URL
      Url: "https://raw.githubusercontent.com/awslabs/diagram-as-code/main/definitions/definition-for-aws-icons-light.yaml"

  # Vietnam Air Quality Pipeline — ap-southeast-1
  # Three parallel ingestion paths → Athena → dbt → Serving + Forecast + Monitoring
  # Generated with: awsdac docs/architecture.yaml -o docs/architecture.png -f

  Resources:

    Canvas:
      Type: AWS::Diagram::Canvas
      Direction: vertical
      Children:
        - ExternalSources
        - AWSCloud
        - ExternalUsers

    # ── External Sources ──────────────────────────────────────────────────────────
    ExternalSources:
      Type: AWS::Diagram::HorizontalStack
      Children:
        - OpenAQArchive
        - OpenAQAPI
        - OpenMeteo

    OpenAQArchive:
      Type: AWS::Diagram::Resource
      Preset: "Amazon Simple Storage Service (Amazon S3)"
      Title: "OpenAQ S3 Archive\nus-east-1 · requester-pays · 21 VN stations"

    OpenAQAPI:
      Type: AWS::Diagram::Resource
      Preset: User
      Title: "OpenAQ REST API v3\nlatest readings per station"

    OpenMeteo:
      Type: AWS::Diagram::Resource
      Preset: User
      Title: "Open-Meteo ERA5\nhourly reanalysis · 7 weather variables"

    # ── AWS Cloud ─────────────────────────────────────────────────────────────────
    AWSCloud:
      Type: AWS::Diagram::Cloud
      Direction: vertical
      Preset: AWSCloudNoLogo
      Children:
        - APSoutheast1
        - USEast1

    APSoutheast1:
      Type: AWS::Region
      Title: "ap-southeast-1 (fully managed — no VPC)"
      Direction: vertical
      Children:
        - SchedulingSecurityRow
        - IngestionRow
        - StorageRow
        - CatalogRow
        - TransformRow
        - ServingRow
        - MonitoringRow

    USEast1:
      Type: AWS::Region
      Title: "us-east-1 (billing resources)"
      Direction: vertical
      Children:
        - BillingRow

    BillingRow:
      Type: AWS::Diagram::HorizontalStack
      Children:
        - BillingAlarm
        - BillingSNS

    BillingAlarm:
      Type: AWS::Diagram::Resource
      Preset: "Amazon CloudWatch"
      Title: "CloudWatch\nopenaq-monthly-spend-high · > $8"

    BillingSNS:
      Type: AWS::Diagram::Resource
      Preset: "Amazon Simple Notification Service (Amazon SNS)"
      Title: "SNS openaq_alerts_billing\n→ billing email"

    # ── Scheduling & Security ─────────────────────────────────────────────────────
    SchedulingSecurityRow:
      Type: AWS::Diagram::HorizontalStack
      Children:
        - EventBridge
        - SecretsManager

    EventBridge:
      Type: AWS::Diagram::Resource
      Preset: "Amazon EventBridge"
      Title: "EventBridge Scheduler\n6 schedules · 01:00/02:00/02:30/03:00 UTC · 30 min · 1 h"

    SecretsManager:
      Type: AWS::Diagram::Resource
      Preset: "AWS Secrets Manager"
      Title: "Secrets Manager\nopenaq/api_key"

    # ── Ingestion Layer ───────────────────────────────────────────────────────────
    IngestionRow:
      Type: AWS::Diagram::HorizontalStack
      Children:
        - BatchSync
        - StreamingProducer
        - WeatherIngest

    BatchSync:
      Type: AWS::Diagram::Resource
      Preset: "AWS Lambda"
      Title: "openaq_batch_sync\n512 MB · 900 s · daily 01:00 UTC"

    StreamingProducer:
      Type: AWS::Diagram::Resource
      Preset: "AWS Lambda"
      Title: "openaq_streaming_producer\n256 MB · 120 s · every 30 min"

    WeatherIngest:
      Type: AWS::Diagram::Resource
      Preset: "AWS Lambda"
      Title: "openaq_weather_ingest\n256 MB · 300 s · daily 02:00 UTC"

    # ── Storage Layer ─────────────────────────────────────────────────────────────
    StorageRow:
      Type: AWS::Diagram::HorizontalStack
      Children:
        - S3Batch
        - KinesisStream
        - Firehose
        - S3Weather

    S3Batch:
      Type: AWS::Diagram::Resource
      Preset: "Amazon Simple Storage Service (Amazon S3)"
      Title: "S3 raw/batch/\nCSV.GZ · locationid / year / month"

    KinesisStream:
      Type: AWS::Diagram::Resource
      Preset: "Amazon Kinesis"
      Title: "Kinesis Data Streams\nopenaq_stream · ON_DEMAND · 7-day retention"

    Firehose:
      Type: AWS::Diagram::Resource
      Preset: "Amazon Data Firehose"
      Title: "Amazon Data Firehose\nopenaq_firehose · GZIP · 128 MB / 300 s"

    S3Weather:
      Type: AWS::Diagram::Resource
      Preset: "Amazon Simple Storage Service (Amazon S3)"
      Title: "S3 raw/weather/\nNDJSON · location / yyyy / MM / dd"

    # ── Catalog & Query Layer ─────────────────────────────────────────────────────
    CatalogRow:
      Type: AWS::Diagram::HorizontalStack
      Children:
        - GlueGroup
        - AthenaGroup
        - SQSDLQ

    GlueGroup:
      Type: AWS::Diagram::Resource
      Preset: "AWS Glue"
      Title: "Glue Data Catalog\nopenaq_raw · partition projection"

    AthenaGroup:
      Type: AWS::Diagram::Resource
      Preset: "Amazon Athena"
      Title: "Athena · openaq_workgroup\n10 GB scan guard · avg 63.6 KB/query"

    SQSDLQ:
      Type: AWS::Diagram::Resource
      Preset: "Amazon Simple Queue Service (Amazon SQS)"
      Title: "SQS DLQ\nopenaq_streaming_dlq · 1-day TTL"

    # ── Transformation Layer ──────────────────────────────────────────────────────
    TransformRow:
      Type: AWS::Diagram::HorizontalStack
      Children:
        - CodeBuild

    CodeBuild:
      Type: AWS::Diagram::Resource
      Preset: "AWS CodeBuild"
      Title: "CodeBuild · openaq-dbt-runner\n17 models · 2 seeds · 85 tests · 02:30 UTC"

    # ── Serving Layer ─────────────────────────────────────────────────────────────
    ServingRow:
      Type: AWS::Diagram::HorizontalStack
      Children:
        - AQIApi
        - APIGateway
        - ECR
        - ForecastLambda

    AQIApi:
      Type: AWS::Diagram::Resource
      Preset: "AWS Lambda"
      Title: "openaq_aqi_api\n256 MB · 60 s · Athena → GeoJSON"

    APIGateway:
      Type: AWS::Diagram::Resource
      Preset: "Amazon API Gateway"
      Title: "API Gateway HTTP API\nGET / · CORS enabled"

    ECR:
      Type: AWS::Diagram::Resource
      Preset: "Amazon Elastic Container Registry (Amazon ECR)"
      Title: "ECR\nopenaq-forecast-generate"

    ForecastLambda:
      Type: AWS::Diagram::Resource
      Preset: "AWS Lambda"
      Title: "openaq_forecast_generate\n3008 MB · 900 s · SARIMA 7-day PM2.5"

    # ── Monitoring Layer ──────────────────────────────────────────────────────────
    MonitoringRow:
      Type: AWS::Diagram::HorizontalStack
      Children:
        - CompletenessCheck
        - CloudWatch
        - SNS

    CompletenessCheck:
      Type: AWS::Diagram::Resource
      Preset: "AWS Lambda"
      Title: "openaq_completeness_check\n256 MB · 120 s · every hour"

    CloudWatch:
      Type: AWS::Diagram::Resource
      Preset: "Amazon CloudWatch"
      Title: "CloudWatch · openaq_pipeline\n3 alarms: RMSE · MissingStations · KinesisAge"

    SNS:
      Type: AWS::Diagram::Resource
      Preset: "Amazon Simple Notification Service (Amazon SNS)"
      Title: "SNS openaq_alerts\n→ alert_email"

    # ── End Users ─────────────────────────────────────────────────────────────────
    ExternalUsers:
      Type: AWS::Diagram::Resource
      Preset: User
      Title: "Leaflet Map\n21 stations · US EPA AQI · XSS-safe"

  Links:

    # ── External sources → Ingestion ──────────────────────────────────────────────
    - Source: OpenAQArchive
      SourcePosition: S
      Target: BatchSync
      TargetPosition: N
      TargetArrowHead:
        Type: Open
      Labels:
        TargetLeft:
          Title: "S3 sync (requester-pays)\n+ SNS event trigger"

    - Source: OpenAQAPI
      SourcePosition: S
      Target: StreamingProducer
      TargetPosition: N
      TargetArrowHead:
        Type: Open
      Labels:
        TargetLeft:
          Title: "GET /v3/locations/{id}/latest"

    - Source: OpenMeteo
      SourcePosition: S
      Target: WeatherIngest
      TargetPosition: N
      TargetArrowHead:
        Type: Open
      Labels:
        TargetLeft:
          Title: "ERA5 hourly reanalysis"

    # ── EventBridge → all scheduled targets ──────────────────────────────────────
    - Source: EventBridge
      SourcePosition: S
      Target: BatchSync
      TargetPosition: N
      TargetArrowHead:
        Type: Open
      LineColor: "rgba(232,140,0,255)"

    - Source: EventBridge
      SourcePosition: S
      Target: StreamingProducer
      TargetPosition: N
      TargetArrowHead:
        Type: Open
      LineColor: "rgba(232,140,0,255)"

    - Source: EventBridge
      SourcePosition: S
      Target: WeatherIngest
      TargetPosition: N
      TargetArrowHead:
        Type: Open
      LineColor: "rgba(232,140,0,255)"

    - Source: EventBridge
      SourcePosition: S
      Target: CodeBuild
      TargetPosition: N
      TargetArrowHead:
        Type: Open
      LineColor: "rgba(232,140,0,255)"

    - Source: EventBridge
      SourcePosition: S
      Target: ForecastLambda
      TargetPosition: N
      TargetArrowHead:
        Type: Open
      LineColor: "rgba(232,140,0,255)"

    - Source: EventBridge
      SourcePosition: S
      Target: CompletenessCheck
      TargetPosition: N
      TargetArrowHead:
        Type: Open
      LineColor: "rgba(232,140,0,255)"

    # ── Secrets Manager → streaming_producer ─────────────────────────────────────
    - Source: SecretsManager
      SourcePosition: S
      Target: StreamingProducer
      TargetPosition: N
      TargetArrowHead:
        Type: Open
      LineColor: "rgba(221,0,49,255)"
      Labels:
        SourceLeft:
          Title: "GetSecretValue"

    # ── Ingestion → Storage ───────────────────────────────────────────────────────
    - Source: BatchSync
      SourcePosition: S
      Target: S3Batch
      TargetPosition: N
      TargetArrowHead:
        Type: Open

    - Source: StreamingProducer
      SourcePosition: S
      Target: KinesisStream
      TargetPosition: N
      TargetArrowHead:
        Type: Open
      Labels:
        SourceLeft:
          Title: "PutRecords (500/batch)"

    - Source: StreamingProducer
      SourcePosition: S
      Target: SQSDLQ
      TargetPosition: N
      TargetArrowHead:
        Type: Open
      LineColor: "rgba(221,0,49,255)"
      Labels:
        SourceLeft:
          Title: "on exception"

    - Source: KinesisStream
      SourcePosition: S
      Target: Firehose
      TargetPosition: N
      TargetArrowHead:
        Type: Open

    - Source: WeatherIngest
      SourcePosition: S
      Target: S3Weather
      TargetPosition: N
      TargetArrowHead:
        Type: Open

    # ── Storage → Glue ────────────────────────────────────────────────────────────
    - Source: S3Batch
      SourcePosition: S
      Target: GlueGroup
      TargetPosition: N
      TargetArrowHead:
        Type: Open

    - Source: Firehose
      SourcePosition: S
      Target: GlueGroup
      TargetPosition: N
      TargetArrowHead:
        Type: Open

    - Source: S3Weather
      SourcePosition: S
      Target: GlueGroup
      TargetPosition: N
      TargetArrowHead:
        Type: Open

    # ── Glue → Athena ─────────────────────────────────────────────────────────────
    - Source: GlueGroup
      SourcePosition: E
      Target: AthenaGroup
      TargetPosition: W
      TargetArrowHead:
        Type: Open
      Labels:
        SourceRight:
          Title: "partition projection"

    # ── Athena ↔ CodeBuild (dbt) ─────────────────────────────────────────────────
    - Source: AthenaGroup
      SourcePosition: S
      Target: CodeBuild
      TargetPosition: N
      TargetArrowHead:
        Type: Open
      Labels:
        SourceLeft:
          Title: "raw tables"

    - Source: CodeBuild
      SourcePosition: N
      Target: AthenaGroup
      TargetPosition: S
      TargetArrowHead:
        Type: Open
      Labels:
        TargetLeft:
          Title: "mart tables (openaq_mart)"

    # ── Athena → Serving ──────────────────────────────────────────────────────────
    - Source: AthenaGroup
      SourcePosition: S
      Target: AQIApi
      TargetPosition: N
      TargetArrowHead:
        Type: Open
      Labels:
        SourceLeft:
          Title: "mart_daily_aqi"

    - Source: AthenaGroup
      SourcePosition: S
      Target: ForecastLambda
      TargetPosition: N
      TargetArrowHead:
        Type: Open
      Labels:
        SourceRight:
          Title: "mart_lagged_features"

    # ── AQI API → API Gateway → User ─────────────────────────────────────────────
    - Source: AQIApi
      SourcePosition: E
      Target: APIGateway
      TargetPosition: W
      TargetArrowHead:
        Type: Open
      Labels:
        SourceRight:
          Title: "GeoJSON"

    - Source: APIGateway
      SourcePosition: S
      Target: ExternalUsers
      TargetPosition: N
      TargetArrowHead:
        Type: Open

    # ── ECR → Forecast Lambda ─────────────────────────────────────────────────────
    - Source: ECR
      SourcePosition: E
      Target: ForecastLambda
      TargetPosition: W
      TargetArrowHead:
        Type: Open
      Labels:
        SourceRight:
          Title: "container image"

    # ── Monitoring ────────────────────────────────────────────────────────────────
    - Source: CompletenessCheck
      SourcePosition: E
      Target: CloudWatch
      TargetPosition: W
      TargetArrowHead:
        Type: Open
      Labels:
        SourceRight:
          Title: "MissingStations metric"

    - Source: ForecastLambda
      SourcePosition: S
      Target: CloudWatch
      TargetPosition: N
      TargetArrowHead:
        Type: Open
      Labels:
        SourceLeft:
          Title: "ForecastRMSE metric"

    - Source: CloudWatch
      SourcePosition: E
      Target: SNS
      TargetPosition: W
      TargetArrowHead:
        Type: Open
      Labels:
        SourceRight:
          Title: "alarm → publish"

    # ── Billing (us-east-1) ───────────────────────────────────────────────────────
    - Source: BillingAlarm
      SourcePosition: E
      Target: BillingSNS
      TargetPosition: W
      TargetArrowHead:
        Type: Open
      Labels:
        SourceRight:
          Title: "alarm → publish"
