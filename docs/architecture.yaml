Diagram:
  DefinitionFiles:
    - Type: URL
      Url: "https://raw.githubusercontent.com/awslabs/diagram-as-code/main/definitions/definition-for-aws-icons-light.yaml"

  # Vietnam Air Quality Pipeline — ap-southeast-1
  # Three parallel ingestion paths → Athena → dbt → Serving + Forecast + Monitoring
  # Generated with: awsdac docs/architecture.yaml -o docs/architecture.png

  Resources:

    Canvas:
      Type: AWS::Diagram::Canvas
      Direction: vertical
      Children:
        - ExternalSources
        - AWSCloud
        - ExternalUsers

    # ── External Sources ──────────────────────────────────────────────────────────
    ExternalSources:
      Type: AWS::Diagram::HorizontalStack
      Children:
        - OpenAQArchive
        - OpenAQAPI
        - OpenMeteo

    OpenAQArchive:
      Type: AWS::Diagram::Resource
      Preset: "Amazon Simple Storage Service (Amazon S3)"
      Title: "OpenAQ S3 Archive\n(us-east-1 · requester-pays\nCSV.GZ · 21 VN stations)"

    OpenAQAPI:
      Type: AWS::Diagram::Resource
      Preset: User
      Title: "OpenAQ REST API v3\n(latest measurements\nper station)"

    OpenMeteo:
      Type: AWS::Diagram::Resource
      Preset: User
      Title: "Open-Meteo ERA5\n(hourly reanalysis\n7 weather variables)"

    # ── AWS Cloud ─────────────────────────────────────────────────────────────────
    AWSCloud:
      Type: AWS::Diagram::Cloud
      Direction: vertical
      Preset: AWSCloudNoLogo
      Children:
        - APSoutheast1

    APSoutheast1:
      Type: AWS::Region
      Title: ap-southeast-1
      Direction: vertical
      Children:
        - SchedulingSecurityRow
        - IngestionRow
        - StorageRow
        - CatalogRow
        - TransformRow
        - ServingRow
        - MonitoringRow

    # ── Scheduling & Security ─────────────────────────────────────────────────────
    SchedulingSecurityRow:
      Type: AWS::Diagram::HorizontalStack
      Children:
        - EventBridge
        - SecretsManager

    EventBridge:
      Type: AWS::Diagram::Resource
      Preset: "Amazon EventBridge"
      Title: "EventBridge Scheduler\n6 schedules\n01:00 · 02:00 · 02:30 · 03:00 UTC daily\nEvery 30 min · Every hour"

    SecretsManager:
      Type: AWS::Diagram::Resource
      Preset: "AWS Secrets Manager"
      Title: "Secrets Manager\nopenaq/api_key\n(OPENAQ_API_KEY)"

    # ── Ingestion Layer ───────────────────────────────────────────────────────────
    IngestionRow:
      Type: AWS::Diagram::HorizontalStack
      Children:
        - BatchSync
        - StreamingProducer
        - WeatherIngest

    BatchSync:
      Type: AWS::Diagram::Resource
      Preset: "AWS Lambda"
      Title: "openaq_batch_sync\npython3.12 · 512 MB · 900 s\n3-month rolling sync\nThreadPoolExecutor(8)"

    StreamingProducer:
      Type: AWS::Diagram::Resource
      Preset: "AWS Lambda"
      Title: "openaq_streaming_producer\npython3.12 · 256 MB · 120 s\nValidation + retry\n(Gap 3 & 4 IoT Lens)"

    WeatherIngest:
      Type: AWS::Diagram::Resource
      Preset: "AWS Lambda"
      Title: "openaq_weather_ingest\npython3.12 · 256 MB · 300 s\n21 stations × 1 request\nOpen-Meteo ERA5 hourly"

    # ── Storage Layer ─────────────────────────────────────────────────────────────
    StorageRow:
      Type: AWS::Diagram::HorizontalStack
      Children:
        - S3Batch
        - KinesisStack
        - S3Weather

    S3Batch:
      Type: AWS::Diagram::Resource
      Preset: "Amazon Simple Storage Service (Amazon S3)"
      Title: "S3 raw/batch/\nlocationid= · year= · month=\nCSV.GZ · OpenCSVSerde\nLifecycle: Intelligent-Tiering"

    KinesisStack:
      Type: AWS::Diagram::HorizontalStack
      Children:
        - KinesisStream
        - Firehose

    KinesisStream:
      Type: AWS::Diagram::Resource
      Preset: "Amazon Kinesis"
      Title: "Kinesis Data Streams\nopenaq_stream · ON_DEMAND\n7-day retention"

    Firehose:
      Type: AWS::Diagram::Resource
      Preset: "Amazon Kinesis Data Firehose"
      Title: "Kinesis Firehose\nopenaq_firehose · GZIP\n128 MB / 300 s buffer\nraw/stream/{yyyy}/{MM}/{dd}/{HH}/"

    S3Weather:
      Type: AWS::Diagram::Resource
      Preset: "Amazon Simple Storage Service (Amazon S3)"
      Title: "S3 raw/weather/\n{location_id}/{yyyy}/{MM}/{dd}/\nNDJSON · ERA5 hourly"

    # ── Catalog & Query Layer ─────────────────────────────────────────────────────
    CatalogRow:
      Type: AWS::Diagram::HorizontalStack
      Children:
        - GlueGroup
        - AthenaGroup
        - SQSDLQ

    GlueGroup:
      Type: AWS::Diagram::Resource
      Preset: "AWS Glue"
      Title: "Glue Data Catalog\nopenaq_raw (batch · stream · weather)\nPartition Projection\n(no Crawler needed)"

    AthenaGroup:
      Type: AWS::Diagram::Resource
      Preset: "Amazon Athena"
      Title: "Athena · openaq_workgroup\n10 GB scan guard\n60-min query result reuse\n$5/TB — avg 63.6 KB/query"

    SQSDLQ:
      Type: AWS::Diagram::Resource
      Preset: "Amazon Simple Queue Service (Amazon SQS)"
      Title: "SQS DLQ\nopenaq_streaming_dlq\n1-day retention\n(Gap 1 IoT Lens)"

    # ── Transformation Layer ──────────────────────────────────────────────────────
    TransformRow:
      Type: AWS::Diagram::HorizontalStack
      Children:
        - CodeBuild

    CodeBuild:
      Type: AWS::Diagram::Resource
      Preset: "AWS CodeBuild"
      Title: "CodeBuild · openaq-dbt-runner\nBUILD_GENERAL1_SMALL · 30 min timeout\nghr.io/dbt-labs/dbt-athena:1.10.0\n17 models · 2 seeds · 85 tests\n(02:30 UTC daily)"

    # ── Serving Layer ─────────────────────────────────────────────────────────────
    ServingRow:
      Type: AWS::Diagram::HorizontalStack
      Children:
        - AQIApiGroup
        - ForecastGroup

    AQIApiGroup:
      Type: AWS::Diagram::HorizontalStack
      Children:
        - AQIApi
        - APIGateway

    AQIApi:
      Type: AWS::Diagram::Resource
      Preset: "AWS Lambda"
      Title: "openaq_aqi_api\npython3.12 · 256 MB · 60 s\nAthena → GeoJSON\n3600 s /tmp cache"

    APIGateway:
      Type: AWS::Diagram::Resource
      Preset: "Amazon API Gateway"
      Title: "API Gateway HTTP API\nGET /\nCORS enabled\n→ Leaflet map"

    ForecastGroup:
      Type: AWS::Diagram::HorizontalStack
      Children:
        - ECR
        - ForecastLambda

    ECR:
      Type: AWS::Diagram::Resource
      Preset: "Amazon Elastic Container Registry"
      Title: "ECR\nopenaq-forecast-generate\nstatsmodels · pandas\npyarrow · boto3"

    ForecastLambda:
      Type: AWS::Diagram::Resource
      Preset: "AWS Lambda"
      Title: "openaq_forecast_generate\nContainer · 3008 MB · 900 s\nSARIMA(1,1,1)(1,0,1,7)\n7-day PM2.5 forecast\n(03:00 UTC daily)"

    # ── Monitoring Layer ──────────────────────────────────────────────────────────
    MonitoringRow:
      Type: AWS::Diagram::HorizontalStack
      Children:
        - CompletenessCheck
        - CloudWatch
        - SNS

    CompletenessCheck:
      Type: AWS::Diagram::Resource
      Preset: "AWS Lambda"
      Title: "openaq_completeness_check\npython3.12 · 256 MB · 120 s\nCount active stations\nEmit MissingStations metric\n(every hour)"

    CloudWatch:
      Type: AWS::Diagram::Resource
      Preset: "Amazon CloudWatch"
      Title: "CloudWatch\nMetrics: ForecastRMSE · MissingStations\nAlarms: RMSE > 25 µg/m³\nMissingStations > 3 (2 × 1 h)\nDashboard: openaq_pipeline"

    SNS:
      Type: AWS::Diagram::Resource
      Preset: "Amazon Simple Notification Service (Amazon SNS)"
      Title: "SNS\nopenaq_alerts → alert_email\nopenaq_alerts_billing → billing email\nHigh RMSE · Low coverage\nBilling threshold $8"

    # ── End Users ─────────────────────────────────────────────────────────────────
    ExternalUsers:
      Type: AWS::Diagram::Resource
      Preset: User
      Title: "Leaflet Map\n(S3 static site · browser)\n21 station markers\nUS EPA AQI colour scale\nXSS-safe escHtml()"

  Links:

    # ── External sources → Ingestion ──────────────────────────────────────────────
    - Source: OpenAQArchive
      SourcePosition: S
      Target: BatchSync
      TargetPosition: N
      TargetArrowHead:
        Type: Open
      Labels:
        TargetLeft:
          Title: "S3 sync (requester-pays)"

    - Source: OpenAQAPI
      SourcePosition: S
      Target: StreamingProducer
      TargetPosition: N
      TargetArrowHead:
        Type: Open
      Labels:
        TargetLeft:
          Title: "GET /v3/locations/{id}/latest"

    - Source: OpenMeteo
      SourcePosition: S
      Target: WeatherIngest
      TargetPosition: N
      TargetArrowHead:
        Type: Open
      Labels:
        TargetLeft:
          Title: "ERA5 hourly reanalysis"

    # ── EventBridge → all scheduled targets ──────────────────────────────────────
    - Source: EventBridge
      SourcePosition: S
      Target: BatchSync
      TargetPosition: N
      TargetArrowHead:
        Type: Open
      LineColor: "rgba(232,140,0,255)"

    - Source: EventBridge
      SourcePosition: S
      Target: StreamingProducer
      TargetPosition: N
      TargetArrowHead:
        Type: Open
      LineColor: "rgba(232,140,0,255)"

    - Source: EventBridge
      SourcePosition: S
      Target: WeatherIngest
      TargetPosition: N
      TargetArrowHead:
        Type: Open
      LineColor: "rgba(232,140,0,255)"

    - Source: EventBridge
      SourcePosition: S
      Target: CodeBuild
      TargetPosition: N
      TargetArrowHead:
        Type: Open
      LineColor: "rgba(232,140,0,255)"

    - Source: EventBridge
      SourcePosition: S
      Target: ForecastLambda
      TargetPosition: N
      TargetArrowHead:
        Type: Open
      LineColor: "rgba(232,140,0,255)"

    - Source: EventBridge
      SourcePosition: S
      Target: CompletenessCheck
      TargetPosition: N
      TargetArrowHead:
        Type: Open
      LineColor: "rgba(232,140,0,255)"

    # ── Secrets Manager → streaming_producer ─────────────────────────────────────
    - Source: SecretsManager
      SourcePosition: S
      Target: StreamingProducer
      TargetPosition: N
      TargetArrowHead:
        Type: Open
      LineColor: "rgba(221,0,49,255)"
      Labels:
        SourceLeft:
          Title: "GetSecretValue"

    # ── Ingestion → Storage ───────────────────────────────────────────────────────
    - Source: BatchSync
      SourcePosition: S
      Target: S3Batch
      TargetPosition: N
      TargetArrowHead:
        Type: Open

    - Source: StreamingProducer
      SourcePosition: S
      Target: KinesisStream
      TargetPosition: N
      TargetArrowHead:
        Type: Open
      Labels:
        SourceLeft:
          Title: "PutRecords (500/batch)"

    - Source: StreamingProducer
      SourcePosition: S
      Target: SQSDLQ
      TargetPosition: N
      TargetArrowHead:
        Type: Open
      LineColor: "rgba(221,0,49,255)"
      Labels:
        SourceLeft:
          Title: "on unhandled exception"

    - Source: KinesisStream
      SourcePosition: S
      Target: Firehose
      TargetPosition: N
      TargetArrowHead:
        Type: Open

    - Source: WeatherIngest
      SourcePosition: S
      Target: S3Weather
      TargetPosition: N
      TargetArrowHead:
        Type: Open

    # ── Storage → Glue ────────────────────────────────────────────────────────────
    - Source: S3Batch
      SourcePosition: S
      Target: GlueGroup
      TargetPosition: N
      TargetArrowHead:
        Type: Open

    - Source: Firehose
      SourcePosition: S
      Target: GlueGroup
      TargetPosition: N
      TargetArrowHead:
        Type: Open

    - Source: S3Weather
      SourcePosition: S
      Target: GlueGroup
      TargetPosition: N
      TargetArrowHead:
        Type: Open

    # ── Glue → Athena ─────────────────────────────────────────────────────────────
    - Source: GlueGroup
      SourcePosition: E
      Target: AthenaGroup
      TargetPosition: W
      TargetArrowHead:
        Type: Open
      Labels:
        SourceRight:
          Title: "partition projection"

    # ── Athena ↔ CodeBuild (dbt) ─────────────────────────────────────────────────
    - Source: AthenaGroup
      SourcePosition: S
      Target: CodeBuild
      TargetPosition: N
      TargetArrowHead:
        Type: Open
      Labels:
        SourceLeft:
          Title: "raw tables"

    - Source: CodeBuild
      SourcePosition: N
      Target: AthenaGroup
      TargetPosition: S
      TargetArrowHead:
        Type: Open
      Labels:
        TargetLeft:
          Title: "mart tables (openaq_mart)"

    # ── Athena → Serving ──────────────────────────────────────────────────────────
    - Source: AthenaGroup
      SourcePosition: S
      Target: AQIApi
      TargetPosition: N
      TargetArrowHead:
        Type: Open
      Labels:
        SourceLeft:
          Title: "mart_daily_aqi"

    - Source: AthenaGroup
      SourcePosition: S
      Target: ForecastLambda
      TargetPosition: N
      TargetArrowHead:
        Type: Open
      Labels:
        SourceRight:
          Title: "mart_lagged_features"

    # ── AQI API → API Gateway → User ─────────────────────────────────────────────
    - Source: AQIApi
      SourcePosition: E
      Target: APIGateway
      TargetPosition: W
      TargetArrowHead:
        Type: Open
      Labels:
        SourceRight:
          Title: "GeoJSON FeatureCollection"

    - Source: APIGateway
      SourcePosition: S
      Target: ExternalUsers
      TargetPosition: N
      TargetArrowHead:
        Type: Open

    # ── ECR → Forecast Lambda ─────────────────────────────────────────────────────
    - Source: ECR
      SourcePosition: E
      Target: ForecastLambda
      TargetPosition: W
      TargetArrowHead:
        Type: Open
      Labels:
        SourceRight:
          Title: "container image"

    # ── Monitoring ────────────────────────────────────────────────────────────────
    - Source: CompletenessCheck
      SourcePosition: E
      Target: CloudWatch
      TargetPosition: W
      TargetArrowHead:
        Type: Open
      Labels:
        SourceRight:
          Title: "MissingStations metric"

    - Source: ForecastLambda
      SourcePosition: S
      Target: CloudWatch
      TargetPosition: N
      TargetArrowHead:
        Type: Open
      Labels:
        SourceLeft:
          Title: "ForecastRMSE metric"

    - Source: CloudWatch
      SourcePosition: E
      Target: SNS
      TargetPosition: W
      TargetArrowHead:
        Type: Open
      Labels:
        SourceRight:
          Title: "alarm → publish"
