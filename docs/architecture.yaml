Diagram:
  DefinitionFiles:
    - Type: URL
      Url: "https://raw.githubusercontent.com/awslabs/diagram-as-code/main/definitions/definition-for-aws-icons-light.yaml"

  # Vietnam Air Quality Pipeline — ap-southeast-1
  # High-level overview: three ingestion paths → Athena → dbt → Serving + Monitoring
  # Generated with: awsdac docs/architecture.yaml -o docs/architecture.png -f

  Resources:

    Canvas:
      Type: AWS::Diagram::Canvas
      Direction: vertical
      Children:
        - ExternalRow
        - AWSCloud
        - UserRow

    # ── External ──────────────────────────────────────────────────────────────────
    ExternalRow:
      Type: AWS::Diagram::HorizontalStack
      Children:
        - OpenAQArchive
        - OpenAQAPI
        - OpenMeteo

    OpenAQArchive:
      Type: AWS::Diagram::Resource
      Preset: "Amazon Simple Storage Service (Amazon S3)"
      Title: "OpenAQ S3 Archive\nus-east-1 · 21 VN stations"

    OpenAQAPI:
      Type: AWS::Diagram::Resource
      Preset: User
      Title: "OpenAQ REST API v3\nlatest readings"

    OpenMeteo:
      Type: AWS::Diagram::Resource
      Preset: User
      Title: "Open-Meteo ERA5\nhourly reanalysis"

    # ── AWS Cloud ─────────────────────────────────────────────────────────────────
    AWSCloud:
      Type: AWS::Diagram::Cloud
      Direction: vertical
      Preset: AWSCloudNoLogo
      Children:
        - MainRegion
        - BillingRegion

    MainRegion:
      Type: AWS::Region
      Title: "ap-southeast-1 (fully managed — no VPC)"
      Direction: vertical
      Children:
        - ScheduleRow
        - IngestRow
        - StorageRow
        - QueryRow
        - ServingRow
        - MonitorRow

    BillingRegion:
      Type: AWS::Region
      Title: "us-east-1"
      Direction: vertical
      Children:
        - BillingRow

    # ── Scheduling ────────────────────────────────────────────────────────────────
    ScheduleRow:
      Type: AWS::Diagram::HorizontalStack
      Children:
        - EventBridge
        - SecretsManager

    EventBridge:
      Type: AWS::Diagram::Resource
      Preset: "Amazon EventBridge"
      Title: "EventBridge Scheduler\n6 rules · daily + every 30 min / 1 h"

    SecretsManager:
      Type: AWS::Diagram::Resource
      Preset: "AWS Secrets Manager"
      Title: "Secrets Manager\nopenaq/api_key"

    # ── Ingestion ─────────────────────────────────────────────────────────────────
    IngestRow:
      Type: AWS::Diagram::HorizontalStack
      Children:
        - BatchLambda
        - StreamingLambda
        - WeatherLambda

    BatchLambda:
      Type: AWS::Diagram::Resource
      Preset: "AWS Lambda"
      Title: "batch_sync\n512 MB · 900 s"

    StreamingLambda:
      Type: AWS::Diagram::Resource
      Preset: "AWS Lambda"
      Title: "streaming_producer\n256 MB · 120 s"

    WeatherLambda:
      Type: AWS::Diagram::Resource
      Preset: "AWS Lambda"
      Title: "weather_ingest\n256 MB · 300 s"

    # ── Storage ───────────────────────────────────────────────────────────────────
    StorageRow:
      Type: AWS::Diagram::HorizontalStack
      Children:
        - S3DataLake
        - KinesisPipeline
        - SQSDLQ

    S3DataLake:
      Type: AWS::Diagram::Resource
      Preset: "Amazon Simple Storage Service (Amazon S3)"
      Title: "S3 Data Lake\nraw/batch/ · raw/weather/"

    KinesisPipeline:
      Type: AWS::Diagram::Resource
      Preset: "Amazon Kinesis"
      Title: "Kinesis Stream → Firehose\nopenaq_stream · raw/stream/"

    SQSDLQ:
      Type: AWS::Diagram::Resource
      Preset: "Amazon Simple Queue Service (Amazon SQS)"
      Title: "SQS DLQ\nopenaq_streaming_dlq"

    # ── Query ─────────────────────────────────────────────────────────────────────
    QueryRow:
      Type: AWS::Diagram::HorizontalStack
      Children:
        - GlueCatalog
        - Athena
        - CodeBuild

    GlueCatalog:
      Type: AWS::Diagram::Resource
      Preset: "AWS Glue"
      Title: "Glue Data Catalog\nopenaq_raw · partition projection"

    Athena:
      Type: AWS::Diagram::Resource
      Preset: "Amazon Athena"
      Title: "Athena · openaq_workgroup\nopenaq_mart (17 models)"

    CodeBuild:
      Type: AWS::Diagram::Resource
      Preset: "AWS CodeBuild"
      Title: "CodeBuild · dbt runner\n17 models · 85 tests · 02:30 UTC"

    # ── Serving ───────────────────────────────────────────────────────────────────
    ServingRow:
      Type: AWS::Diagram::HorizontalStack
      Children:
        - AQIService
        - ForecastService

    AQIService:
      Type: AWS::Diagram::Resource
      Preset: "AWS Lambda"
      Title: "aqi_api → API Gateway\nAthena → GeoJSON · CORS"

    ForecastService:
      Type: AWS::Diagram::Resource
      Preset: "AWS Lambda"
      Title: "forecast_generate (ECR)\nSARIMA 7-day PM2.5 · 03:00 UTC"

    # ── Monitoring ────────────────────────────────────────────────────────────────
    MonitorRow:
      Type: AWS::Diagram::HorizontalStack
      Children:
        - CompletenessLambda
        - MonitoringStack

    CompletenessLambda:
      Type: AWS::Diagram::Resource
      Preset: "AWS Lambda"
      Title: "completeness_check\nevery hour · MissingStations metric"

    MonitoringStack:
      Type: AWS::Diagram::Resource
      Preset: "Amazon CloudWatch"
      Title: "CloudWatch + SNS\n4 alarms · openaq_alerts email"

    # ── Billing (us-east-1) ───────────────────────────────────────────────────────
    BillingRow:
      Type: AWS::Diagram::HorizontalStack
      Children:
        - BillingMonitor

    BillingMonitor:
      Type: AWS::Diagram::Resource
      Preset: "Amazon CloudWatch"
      Title: "CloudWatch + SNS\nBilling alarm · > $8/month"

    # ── End User ──────────────────────────────────────────────────────────────────
    UserRow:
      Type: AWS::Diagram::HorizontalStack
      Children:
        - LeafletMap

    LeafletMap:
      Type: AWS::Diagram::Resource
      Preset: User
      Title: "Leaflet Map\n21 stations · US EPA AQI · XSS-safe"

  Links:

    # ── External → Ingestion ──────────────────────────────────────────────────────
    - Source: OpenAQArchive
      SourcePosition: S
      Target: BatchLambda
      TargetPosition: N
      TargetArrowHead:
        Type: Open

    - Source: OpenAQAPI
      SourcePosition: S
      Target: StreamingLambda
      TargetPosition: N
      TargetArrowHead:
        Type: Open

    - Source: OpenMeteo
      SourcePosition: S
      Target: WeatherLambda
      TargetPosition: N
      TargetArrowHead:
        Type: Open

    # ── EventBridge triggers (orange) ─────────────────────────────────────────────
    - Source: EventBridge
      SourcePosition: S
      Target: BatchLambda
      TargetPosition: N
      TargetArrowHead:
        Type: Open
      LineColor: "rgba(232,140,0,255)"

    - Source: EventBridge
      SourcePosition: S
      Target: StreamingLambda
      TargetPosition: N
      TargetArrowHead:
        Type: Open
      LineColor: "rgba(232,140,0,255)"

    - Source: EventBridge
      SourcePosition: S
      Target: WeatherLambda
      TargetPosition: N
      TargetArrowHead:
        Type: Open
      LineColor: "rgba(232,140,0,255)"

    - Source: EventBridge
      SourcePosition: S
      Target: CodeBuild
      TargetPosition: N
      TargetArrowHead:
        Type: Open
      LineColor: "rgba(232,140,0,255)"

    - Source: EventBridge
      SourcePosition: S
      Target: ForecastService
      TargetPosition: N
      TargetArrowHead:
        Type: Open
      LineColor: "rgba(232,140,0,255)"

    - Source: EventBridge
      SourcePosition: S
      Target: CompletenessLambda
      TargetPosition: N
      TargetArrowHead:
        Type: Open
      LineColor: "rgba(232,140,0,255)"

    # ── Secrets (red) ─────────────────────────────────────────────────────────────
    - Source: SecretsManager
      SourcePosition: S
      Target: StreamingLambda
      TargetPosition: N
      TargetArrowHead:
        Type: Open
      LineColor: "rgba(221,0,49,255)"

    # ── Ingestion → Storage ───────────────────────────────────────────────────────
    - Source: BatchLambda
      SourcePosition: S
      Target: S3DataLake
      TargetPosition: N
      TargetArrowHead:
        Type: Open

    - Source: StreamingLambda
      SourcePosition: S
      Target: KinesisPipeline
      TargetPosition: N
      TargetArrowHead:
        Type: Open

    - Source: StreamingLambda
      SourcePosition: S
      Target: SQSDLQ
      TargetPosition: N
      TargetArrowHead:
        Type: Open
      LineColor: "rgba(221,0,49,255)"

    - Source: WeatherLambda
      SourcePosition: S
      Target: S3DataLake
      TargetPosition: N
      TargetArrowHead:
        Type: Open

    - Source: KinesisPipeline
      SourcePosition: S
      Target: S3DataLake
      TargetPosition: N
      TargetArrowHead:
        Type: Open

    # ── Storage → Glue → Athena ───────────────────────────────────────────────────
    - Source: S3DataLake
      SourcePosition: S
      Target: GlueCatalog
      TargetPosition: N
      TargetArrowHead:
        Type: Open

    - Source: GlueCatalog
      SourcePosition: E
      Target: Athena
      TargetPosition: W
      TargetArrowHead:
        Type: Open
      Labels:
        SourceRight:
          Title: "partition projection"

    # ── Athena ↔ dbt ──────────────────────────────────────────────────────────────
    - Source: Athena
      SourcePosition: E
      Target: CodeBuild
      TargetPosition: W
      TargetArrowHead:
        Type: Open

    - Source: CodeBuild
      SourcePosition: W
      Target: Athena
      TargetPosition: E
      TargetArrowHead:
        Type: Open
      Labels:
        TargetRight:
          Title: "openaq_mart"

    # ── Athena → Serving ──────────────────────────────────────────────────────────
    - Source: Athena
      SourcePosition: S
      Target: AQIService
      TargetPosition: N
      TargetArrowHead:
        Type: Open
      Labels:
        SourceLeft:
          Title: "mart_daily_aqi"

    - Source: Athena
      SourcePosition: S
      Target: ForecastService
      TargetPosition: N
      TargetArrowHead:
        Type: Open
      Labels:
        SourceRight:
          Title: "mart_lagged_features"

    # ── Serving → User & Monitoring ───────────────────────────────────────────────
    - Source: AQIService
      SourcePosition: S
      Target: LeafletMap
      TargetPosition: N
      TargetArrowHead:
        Type: Open

    - Source: ForecastService
      SourcePosition: S
      Target: MonitoringStack
      TargetPosition: N
      TargetArrowHead:
        Type: Open

    - Source: CompletenessLambda
      SourcePosition: E
      Target: MonitoringStack
      TargetPosition: W
      TargetArrowHead:
        Type: Open
