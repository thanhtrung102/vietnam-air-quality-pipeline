name: Validate

# Lightweight validation on every push and pull request:
#   1. Terraform formatting, init (no backend), and validate
#   2. Python unit tests for the Lambda functions
#   3. dbt parse (best-effort — skipped/non-fatal when no profile is reachable)
#
# Note: the separate diagram.yml workflow only regenerates docs/architecture.png
# from docs/architecture.yaml; it does not validate code.

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  terraform:
    name: Terraform validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.9.8"

      # _qs_disabled is not loaded by Terraform (the QuickSight stack is disabled
      # in this deployment), so it is intentionally excluded from validation.
      - name: Terraform fmt check
        working-directory: terraform
        run: terraform fmt -check -recursive

      - name: Terraform init (no backend)
        working-directory: terraform
        run: terraform init -backend=false -input=false

      - name: Terraform validate
        working-directory: terraform
        run: terraform validate

  python-tests:
    name: Lambda unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # The Lambda tests stub heavy/runtime deps (numpy, pandas, statsmodels) via
      # sys.modules and mock boto3/requests, so only pytest, boto3 and requests
      # are required to run them.
      - name: Install test dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install pytest boto3 requests

      - name: Run pytest
        run: python -m pytest lambda/tests

  dbt-parse:
    name: dbt parse (best-effort)
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dbt
        run: |
          python -m pip install --upgrade pip
          python -m pip install dbt-athena-community==1.10.0

      # dbt parse needs a reachable profile/credentials; allowed to fail in CI
      # where no AWS profile is configured. continue-on-error keeps the job green.
      - name: dbt parse
        working-directory: transform
        run: dbt parse --profiles-dir .
