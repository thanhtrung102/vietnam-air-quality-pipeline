name: Regenerate architecture diagram

# This workflow ONLY regenerates docs/architecture.png from docs/architecture_diagram.py
# (mingrammer diagrams + Graphviz). It performs no code validation — see validate.yml.

on:
  push:
    paths:
      - 'docs/architecture_diagram.py'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Generate PNG (mingrammer diagrams + Graphviz)
        run: |
          sudo apt-get update -qq && sudo apt-get install -y -qq graphviz
          pip install --quiet diagrams
          python docs/architecture_diagram.py

      - name: Commit updated diagram
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/architecture.png docs/architecture_lifecycle.png
          git diff --cached --quiet || git commit -m "chore: regenerate architecture.png from architecture.yaml [skip ci]"
          git push
