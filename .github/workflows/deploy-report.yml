name: Deploy FCJ report site

on:
  push:
    branches: [main]
    paths:
      - "report/**"
      - "docs/architecture_diagram.py"
      - ".github/workflows/deploy-report.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      # Pinned to match the reference FCJ site; hugo-theme-learn requires pre-0.158
      # (it calls .Site.IsMultiLingual, removed in 0.158).
      HUGO_VERSION: 0.134.3
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0
      - name: Install Hugo (extended)
        run: |
          wget -q -O hugo.deb "https://github.com/gohugoio/hugo/releases/download/v${HUGO_VERSION}/hugo_extended_${HUGO_VERSION}_linux-amd64.deb"
          sudo dpkg -i hugo.deb
      - name: Regenerate AWS-icon architecture diagram (mingrammer diagrams + Graphviz)
        run: |
          sudo apt-get update -qq && sudo apt-get install -y -qq graphviz
          pip install --quiet diagrams
          python docs/architecture_diagram.py
          mkdir -p report/static/images
          cp docs/architecture.png report/static/images/architecture.png
      - uses: actions/configure-pages@v5
        id: pages
      - name: Build site
        run: hugo --gc --minify -s report --baseURL "${{ steps.pages.outputs.base_url }}/"
      - uses: actions/upload-pages-artifact@v3
        with:
          path: report/public

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
