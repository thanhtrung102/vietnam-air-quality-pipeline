version: 2

sources:
  - name: openaq_raw
    description: Raw OpenAQ measurements catalogued in the openaq_raw Glue database
    database: AwsDataCatalog
    schema: openaq_raw

    tables:
      # `batch` is THE measurements source the staging layer reads (stg_measurements
      # selects from source('openaq_raw','batch')). The previously-listed
      # `raw_measurements` source was an orphan: no such Glue table exists
      # (TABLE_NOT_FOUND), and no model referenced it — only the removed
      # `dbt source freshness` gate named it. Source freshness is no longer declared
      # here because dbt-athena computes it from Glue metadata `last_modified` and
      # returns a string (dbt-athena #631) — it errors on every source. Freshness is
      # instead enforced by the singular test tests/assert_batch_source_fresh.sql
      # (query-based, works on Athena; 21-day threshold matching the deployed
      # DaysSinceLastNewMart alarm). The weather path has its own
      # tests/assert_weather_source_fresh.sql; stream has no dbt consumer and is
      # monitored in CloudWatch (see the `stream` table note below).
      - name: batch
        description: >
          Historical and daily-incremental CSV.GZ files synced from the
          openaq-data-archive S3 bucket into raw/batch/. The unified measurements
          source read by stg_measurements. Hive-partitioned by
          locationid / year / month. Partition Projection enabled in Glue.
        columns:
          - name: location_id
          - name: sensors_id
          - name: location
          - name: datetime
          - name: lat
          - name: lon
          - name: parameter
          - name: units
          - name: value

      - name: stream
        description: >
          Near-real-time NDJSON records written by Kinesis Firehose from the
          openaq_stream Kinesis Data Stream into raw/stream/. Partitioned by
          year / month / day / hour. Partition Projection enabled in Glue.
          Not consumed by any dbt model (the marts read `batch`), so there is no
          downstream consumer for a dbt freshness test to protect — and the dbt run
          is daily (02:30 UTC), the wrong cadence to monitor a 30-min stream. Stream
          health is therefore monitored in CloudWatch, not dbt: the deployed alarms
          openaq-kinesis-iterator-age-high (consumer lag), openaq-streaming-dlq-depth,
          and openaq-streaming_producer-errors. (Note: these catch errors/lag, not a
          cleanly stopped producer; the openaq_streaming_30min schedule being ENABLED
          is what keeps it live — verified live 2026-05-31, stream receiving data.)
        columns:
          - name: location_id
          - name: sensors_id
          - name: location
          - name: datetime
          - name: lat
          - name: lon
          - name: parameter
          - name: units
          - name: value
          - name: ingested_at
            description: ISO-8601 UTC timestamp when the record was written to Kinesis

      - name: weather
        description: >
          Hourly ERA5 reanalysis weather written by the weather_ingest Lambda
          to raw/weather/{location_id}/{yyyy}/{MM}/{dd}/weather.ndjson.
          Partitioned by location_id / year / month / day.
          Partition Projection enabled in Glue. One row per station per UTC hour.
          No dbt source-freshness block (dbt-athena source freshness is unreliable —
          see `batch` note), but freshness IS enforced via the singular test
          tests/assert_weather_source_fresh.sql, which queries the consumer mart
          mart_daily_weather (7-day threshold; Open-Meteo/ERA5 lag is shorter than the
          OpenAQ archive's — weather mart was only 1 day behind on 2026-05-31).
        columns:
          - name: location_id
            description: OpenAQ location ID (Glue partition key, int)
          - name: date
            description: Calendar date string (YYYY-MM-DD) for the observation
          - name: hour_utc
            description: Hour of the day in UTC (0–23)
          - name: temperature_2m
            description: Air temperature at 2 m above ground (°C)
          - name: rh_2m
            description: Relative humidity at 2 m above ground (%)
          - name: wind_speed
            description: Wind speed at 10 m above ground (m/s)
          - name: wind_dir
            description: Wind direction at 10 m above ground (degrees, 0=N)
          - name: precipitation_mm
            description: Precipitation in the hour (mm)
          - name: surface_pressure_hpa
            description: Surface atmospheric pressure (hPa)
          - name: boundary_layer_height_m
            description: >
              Planetary boundary layer height (m). ERA5 BLH diagnostic;
              hours between model steps are linearly interpolated by Open-Meteo.
              Low values (< 500 m) indicate temperature inversion / pollutant trapping.
