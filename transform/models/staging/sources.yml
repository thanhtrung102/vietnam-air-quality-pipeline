version: 2

sources:
  - name: openaq_raw
    description: Raw OpenAQ measurements catalogued in the openaq_raw Glue database
    database: AwsDataCatalog
    schema: openaq_raw

    tables:
      - name: raw_measurements
        description: >
          Unified external table over all batch CSV.GZ files in raw/batch/.
          Hive-partitioned by locationid / year / month with Partition Projection.
          OpenCSVSerde handles both quoted (2024-2025) and unquoted (2023) CSV files.
        freshness:
          warn_after: {count: 25, period: hour}
          error_after: {count: 49, period: hour}
        loaded_at_field: datetime
        columns:
          - name: location_id
            description: OpenAQ internal location ID
          - name: sensors_id
            description: Sensor ID (one location may have multiple sensors / parameters)
          - name: location
            description: Station name as recorded in the archive
          - name: datetime
            description: ISO-8601 timestamp with +07:00 timezone offset
          - name: lat
            description: WGS-84 latitude
          - name: lon
            description: WGS-84 longitude (may have floating-point noise)
          - name: parameter
            description: "Pollutant code: pm25, pm10, no2, o3, co, so2, bc"
          - name: units
            description: "Measurement units: µg/m³, ppm, or ppb"
          - name: value
            description: Measured concentration; sentinel -999.0 means missing

      - name: batch
        description: >
          Historical and daily-incremental CSV.GZ files synced from the
          openaq-data-archive S3 bucket into raw/batch/. Hive-partitioned by
          locationid / year / month. Partition Projection enabled in Glue.
        columns:
          - name: location_id
          - name: sensors_id
          - name: location
          - name: datetime
          - name: lat
          - name: lon
          - name: parameter
          - name: units
          - name: value

      - name: stream
        description: >
          Near-real-time NDJSON records written by Kinesis Firehose from the
          openaq_stream Kinesis Data Stream into raw/stream/. Partitioned by
          year / month / day / hour. Partition Projection enabled in Glue.
        freshness:
          warn_after: {count: 2, period: hour}
          error_after: {count: 6, period: hour}
        loaded_at_field: ingested_at
        columns:
          - name: location_id
          - name: sensors_id
          - name: location
          - name: datetime
          - name: lat
          - name: lon
          - name: parameter
          - name: units
          - name: value
          - name: ingested_at
            description: ISO-8601 UTC timestamp when the record was written to Kinesis

      - name: weather
        description: >
          Hourly ERA5 reanalysis weather written by the weather_ingest Lambda
          to raw/weather/{location_id}/{yyyy}/{MM}/{dd}/weather.ndjson.
          Partitioned by location_id / year / month / day.
          Partition Projection enabled in Glue. One row per station per UTC hour.
        freshness:
          warn_after: {count: 30, period: hour}   # 1.25 days — ERA5 lag ~5 days
          error_after: {count: 54, period: hour}  # 2.25 days
        loaded_at_field: date
        columns:
          - name: location_id
            description: OpenAQ location ID (Glue partition key, int)
          - name: date
            description: Calendar date string (YYYY-MM-DD) for the observation
          - name: hour_utc
            description: Hour of the day in UTC (0–23)
          - name: temperature_2m
            description: Air temperature at 2 m above ground (°C)
          - name: rh_2m
            description: Relative humidity at 2 m above ground (%)
          - name: wind_speed
            description: Wind speed at 10 m above ground (m/s)
          - name: wind_dir
            description: Wind direction at 10 m above ground (degrees, 0=N)
          - name: precipitation_mm
            description: Precipitation in the hour (mm)
          - name: surface_pressure_hpa
            description: Surface atmospheric pressure (hPa)
          - name: boundary_layer_height_m
            description: >
              Planetary boundary layer height (m). ERA5 BLH diagnostic;
              hours between model steps are linearly interpolated by Open-Meteo.
              Low values (< 500 m) indicate temperature inversion / pollutant trapping.
