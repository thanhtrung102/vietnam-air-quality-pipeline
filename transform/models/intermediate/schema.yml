version: 2

models:
  - name: int_measurements_enriched
    description: >
      Staging measurements enriched with station metadata from the vn_stations seed.
      Left-joins on location_id to add city, province, canonical station coordinates,
      and location_name. Rows without a city mapping (station IDs absent from the seed)
      are excluded.

    columns:
      - name: location_id
        description: OpenAQ internal location identifier
        tests:
          - not_null

      - name: sensor_id
        description: OpenAQ sensor identifier

      - name: location
        description: Station name string as stored in the archive

      - name: measured_at
        description: Measurement timestamp (TIMESTAMP, timezone-normalised)

      - name: measurement_date
        description: Calendar date derived from measured_at (for mart partitioning)

      - name: lat
        description: WGS-84 latitude from the raw archive (rounded to 6 dp)

      - name: lon
        description: WGS-84 longitude from the raw archive (rounded to 6 dp)

      - name: parameter
        description: Pollutant code (lower-cased)

      - name: units
        description: Measurement unit string (µg/m³, ppm, ppb)

      - name: measurement_value
        description: Measured concentration as DOUBLE

      - name: location_name
        description: Canonical station name from vn_stations seed

      - name: city
        description: City where the station is located (Hanoi or Ho Chi Minh City)
        tests:
          - not_null

      - name: province
        description: Province / administrative division from vn_stations seed

      - name: station_lat
        description: Canonical WGS-84 latitude from vn_stations seed

      - name: station_lon
        description: Canonical WGS-84 longitude from vn_stations seed

      - name: sensor_type
        description: >
          Instrument type from vn_stations seed: 'reference' for government FEM
          monitors; 'low_cost' for AirGradient optical sensors (stations 6123215,
          6068138, 6273386). Used for downstream filtering; EPA humidity correction
          pending RH self-join implementation.

  - name: int_weather_enriched
    description: >
      Hourly ERA5 weather from stg_weather enriched with station metadata
      from vn_stations. Inner join excludes any unexpected location_ids not
      present in the seed. Preserves hourly grain for flexible aggregation.

    columns:
      - name: location_id
        description: OpenAQ location identifier
        tests:
          - not_null

      - name: measurement_date
        description: Calendar date of the weather observation (DATE)
        tests:
          - not_null

      - name: hour_utc
        description: Hour of the observation in UTC (0–23)

      - name: temperature_2m
        description: Air temperature at 2 m (°C, rounded to 4 dp)

      - name: rh_2m
        description: Relative humidity at 2 m (%, rounded to 2 dp)

      - name: wind_speed
        description: Wind speed at 10 m (m/s, rounded to 4 dp)

      - name: wind_dir
        description: Wind direction at 10 m (degrees 0–360, rounded to 2 dp)

      - name: precipitation_mm
        description: Hourly precipitation (mm, rounded to 4 dp)

      - name: surface_pressure_hpa
        description: Surface pressure (hPa, rounded to 2 dp)

      - name: boundary_layer_height_m
        description: Planetary boundary layer height (m, rounded to 1 dp)

      - name: location_name
        description: Canonical station name from vn_stations seed

      - name: city
        description: City (Hanoi or Ho Chi Minh City)
        tests:
          - not_null

      - name: province
        description: Province / administrative division

      - name: sensor_type
        description: Instrument type from vn_stations seed (reference or low_cost)
