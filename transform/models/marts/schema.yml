version: 2

models:
  - name: mart_daily_air_quality
    description: >
      Daily average air quality per station and pollutant.
      Grain: one row per measurement_date × location_id × parameter.
      Partitioned by measurement_date; bucketed by parameter and location_id
      (8 buckets) for efficient dashboard queries.

    tests:
      - dbt_utils.unique_combination_of_columns:
          arguments:
            combination_of_columns:
              - measurement_date
              - location_id
              - parameter

    columns:
      - name: measurement_date
        description: Calendar date of the aggregated readings (partition key)
        tests:
          - not_null

      - name: city
        description: City where the station is located (Hanoi or Ho Chi Minh City)
        tests:
          - not_null

      - name: province
        description: Province / administrative division

      - name: parameter
        description: Pollutant code (pm25, pm10, o3, no2, so2, co, bc, etc.)
        tests:
          - not_null

      - name: location_id
        description: OpenAQ internal location identifier
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('vn_stations')
                field: location_id

      - name: location_name
        description: Canonical station name from vn_stations seed

      - name: station_lat
        description: Canonical WGS-84 latitude from vn_stations seed

      - name: station_lon
        description: Canonical WGS-84 longitude from vn_stations seed

      - name: avg_value
        description: Daily mean concentration (rounded to 4 dp)
        tests:
          - not_null

      - name: max_value
        description: Daily maximum concentration (rounded to 4 dp)

      - name: min_value
        description: Daily minimum concentration (rounded to 4 dp)

      - name: reading_count
        description: Number of valid readings contributing to the daily aggregate
        tests:
          - not_null

      - name: sensor_count
        description: Number of distinct sensors contributing to the daily aggregate

      - name: sensor_type
        description: >
          Instrument type: 'reference' for FEM monitors, 'low_cost' for AirGradient
          optical sensors. Enables dashboard filtering by instrument quality.

      - name: aqi_value
        description: >
          US EPA 2024 AQI (0–500) computed from avg_value via piecewise linear
          interpolation. NULL for non-PM2.5 parameters. Breakpoints: Good 0–50
          (0–9 µg/m³), Moderate 51–100 (9.1–35.4), USG 101–150 (35.5–55.4),
          Unhealthy 151–200 (55.5–125.4), Very Unhealthy 201–300 (125.5–225.4),
          Hazardous 301–500 (225.5–325.4).

      - name: aqi_category
        description: >
          AQI category label corresponding to aqi_value. One of: Good, Moderate,
          Unhealthy for Sensitive Groups, Unhealthy, Very Unhealthy, Hazardous.
          NULL for non-PM2.5 parameters.

      - name: exceeds_who_24h
        description: >
          TRUE when avg_value > 15 µg/m³ (WHO AQG 2021 24-hour guideline).
          NULL for non-PM2.5 parameters.

      - name: exceeds_qcvn
        description: >
          TRUE when avg_value > 50 µg/m³ (QCVN 05:2023 Vietnam 24-hour standard).
          NULL for non-PM2.5 parameters.

      - name: who_compliant_day
        description: >
          1 if PM2.5 daily avg ≤ 15 µg/m³ (WHO AQG compliant), 0 otherwise.
          NULL for non-PM2.5 parameters. Summed in mart_health_summary.

      - name: cigarette_equivalent
        description: >
          PM2.5 daily avg / 22.0 µg/m³ — cigarettes per day equivalent exposure
          (Berkeley Earth / aqi.in standard). NULL for non-PM2.5 parameters.

  - name: mart_daily_aqi
    description: >
      Composite AQI per station per day — the maximum individual-pollutant AQI
      across all parameters reported for that station.
      Grain: one row per measurement_date × location_id.
      Partitioned by measurement_date.

    tests:
      - dbt_utils.unique_combination_of_columns:
          arguments:
            combination_of_columns:
              - measurement_date
              - location_id

    columns:
      - name: measurement_date
        description: Calendar date (partition key)
        tests:
          - not_null

      - name: location_id
        description: OpenAQ internal location identifier
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('vn_stations')
                field: location_id

      - name: location_name
        description: Canonical station name from vn_stations seed

      - name: city
        description: City (Hanoi or Ho Chi Minh City)
        tests:
          - not_null

      - name: province
        description: Province / administrative division

      - name: station_lat
        description: Canonical WGS-84 latitude

      - name: station_lon
        description: Canonical WGS-84 longitude

      - name: sensor_type
        description: Instrument type — 'reference' or 'low_cost'

      - name: composite_aqi
        description: Maximum individual-pollutant AQI for this station on this date
        tests:
          - not_null

      - name: dominant_pollutant
        description: Parameter (pm25, pm10) that produced the composite AQI
        tests:
          - not_null

      - name: health_category
        description: >
          AQI health category label for the composite AQI. One of: Good, Moderate,
          Unhealthy for Sensitive Groups, Unhealthy, Very Unhealthy, Hazardous.
        tests:
          - not_null

      - name: pm25_avg
        description: >
          PM2.5 daily average (µg/m³) for context. NULL if the station reported
          no PM2.5 measurements on that date.

      - name: cigarette_equivalent
        description: >
          pm25_avg / 22.0 — cigarettes per day equivalent (Berkeley Earth standard).
          NULL if pm25_avg is NULL.

  - name: mart_health_summary
    description: >
      Annual health day counts and WHO compliance per city.
      Grain: one row per city × year.
      Aggregates mart_daily_air_quality at the city level (mean across all reference
      stations) to avoid double-counting multi-station cities like Hanoi (16 stations).

    tests:
      - dbt_utils.unique_combination_of_columns:
          arguments:
            combination_of_columns:
              - city
              - year

    columns:
      - name: city
        description: City name
        tests:
          - not_null

      - name: province
        description: Province / administrative division

      - name: year
        description: Calendar year (integer)
        tests:
          - not_null

      - name: total_days
        description: Number of days with at least one PM2.5 measurement in this city/year
        tests:
          - not_null

      - name: good_days
        description: Days where city-level PM2.5 AQI category was Good (avg ≤ 9.0 µg/m³)

      - name: moderate_days
        description: Days where city-level AQI category was Moderate

      - name: usg_days
        description: Days where city-level AQI category was Unhealthy for Sensitive Groups

      - name: unhealthy_days
        description: Days where city-level AQI category was Unhealthy

      - name: very_unhealthy_days
        description: Days where city-level AQI category was Very Unhealthy

      - name: hazardous_days
        description: Days where city-level AQI category was Hazardous

      - name: who_compliant_days
        description: Days where city-level PM2.5 avg ≤ 15 µg/m³ (WHO AQG 2021)

      - name: who_compliance_pct
        description: who_compliant_days / total_days × 100 (rounded to 1 dp)
        tests:
          - not_null

      - name: avg_pm25
        description: Mean daily PM2.5 city average across the year (µg/m³, 1 dp)

      - name: avg_cigarette_equivalent
        description: Mean daily cigarette equivalent across the year (2 dp)

      - name: max_pm25
        description: Peak daily PM2.5 city average in the year (µg/m³, 1 dp)

      - name: risk_label
        description: >
          WHO compliance risk tier: Low (≥80%), Moderate (50–79%), High (20–49%),
          Extreme (<20%). Used as a headline KPI in the dashboard.
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['Low', 'Moderate', 'High', 'Extreme']

  - name: mart_diurnal_profile
    description: >
      Average pollutant concentration by hour of day (Vietnam local time, UTC+7).
      Grain: one row per location_id × parameter × hour_of_day × day_type × season.
      Drives the rush-hour line chart (weekday vs weekend × monsoon season) in the dashboard.

    tests:
      - dbt_utils.unique_combination_of_columns:
          arguments:
            combination_of_columns:
              - location_id
              - parameter
              - hour_of_day
              - day_type
              - season

    columns:
      - name: location_id
        description: OpenAQ internal location identifier
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('vn_stations')
                field: location_id

      - name: location_name
        description: Canonical station name

      - name: city
        description: City (Hanoi or Ho Chi Minh City)
        tests:
          - not_null

      - name: province
        description: Province / administrative division

      - name: sensor_type
        description: Instrument type — 'reference' or 'low_cost'

      - name: parameter
        description: Pollutant code
        tests:
          - not_null

      - name: hour_of_day
        description: Local hour (0–23, UTC+7, no DST)
        tests:
          - not_null

      - name: day_type
        description: >
          'Weekday' (Mon–Fri) or 'Weekend' (Sat–Sun). Traffic-driven rush-hour
          peaks are significantly attenuated on weekends.
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['Weekday', 'Weekend']

      - name: season
        description: >
          Vietnam meteorological season: 'NE Monsoon (Nov-Mar)', 'Transition (Apr-May)',
          'SW Monsoon (Jun-Sep)', or 'Transition (Oct)'.
        tests:
          - not_null

      - name: avg_value
        description: Mean concentration for this station/parameter/hour across all dates
        tests:
          - not_null

      - name: max_value
        description: Maximum concentration recorded in this hour bucket

      - name: min_value
        description: Minimum concentration recorded in this hour bucket

      - name: reading_count
        description: Number of individual measurements in this hour bucket

  - name: mart_monthly_profile
    description: >
      Average pollutant concentration by month of year.
      Grain: one row per location_id × parameter × month_of_year (1–12).
      Drives the seasonal bar/line chart and hour × month heatmap in the dashboard.

    tests:
      - dbt_utils.unique_combination_of_columns:
          arguments:
            combination_of_columns:
              - location_id
              - parameter
              - month_of_year

    columns:
      - name: location_id
        description: OpenAQ internal location identifier
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('vn_stations')
                field: location_id

      - name: location_name
        description: Canonical station name

      - name: city
        description: City (Hanoi or Ho Chi Minh City)
        tests:
          - not_null

      - name: province
        description: Province / administrative division

      - name: sensor_type
        description: Instrument type — 'reference' or 'low_cost'

      - name: parameter
        description: Pollutant code
        tests:
          - not_null

      - name: month_of_year
        description: Calendar month (1 = January, 12 = December)
        tests:
          - not_null

      - name: season
        description: >
          Vietnam meteorological season derived from month_of_year: 'NE Monsoon (Nov-Mar)',
          'Transition (Apr-May)', 'SW Monsoon (Jun-Sep)', or 'Transition (Oct)'.
          Deterministic from month — no grain change.
        tests:
          - not_null

      - name: avg_value
        description: Mean concentration for this station/parameter/month across all years
        tests:
          - not_null

      - name: max_value
        description: Maximum concentration recorded in this month bucket

      - name: min_value
        description: Minimum concentration recorded in this month bucket

      - name: p95_value
        description: 95th-percentile concentration (approx) for this month bucket

      - name: reading_count
        description: Number of individual measurements in this month bucket

      - name: day_count
        description: Number of distinct calendar dates contributing to this month bucket

  - name: mart_exceedance_stats
    description: >
      Monthly WHO and QCVN exceedance counts and rates per city and pollutant.
      Grain: one row per city × parameter × year × month_of_year.
      Source: mart_daily_air_quality (outlier station 6273386 excluded).
      Answers: "Is the WHO exceedance rate in Hanoi getting worse each January?"

    tests:
      - dbt_utils.unique_combination_of_columns:
          arguments:
            combination_of_columns:
              - city
              - parameter
              - year
              - month_of_year

    columns:
      - name: city
        description: City name (Hanoi or Ho Chi Minh City)
        tests:
          - not_null

      - name: parameter
        description: Pollutant code (pm25 only in this mart)
        tests:
          - not_null

      - name: year
        description: Calendar year (integer)
        tests:
          - not_null

      - name: month_of_year
        description: Calendar month (1–12)
        tests:
          - not_null

      - name: total_days
        description: Total station-days with PM2.5 readings in this city/year/month
        tests:
          - not_null

      - name: who_exceedance_days
        description: Days where city-level PM2.5 avg > 15 µg/m³ (WHO AQG 2021)

      - name: qcvn_exceedance_days
        description: Days where city-level PM2.5 avg > 50 µg/m³ (QCVN 05:2023)

      - name: who_exceedance_rate
        description: who_exceedance_days / total_days × 100 (rounded to 1 dp)

      - name: qcvn_exceedance_rate
        description: qcvn_exceedance_days / total_days × 100 (rounded to 1 dp)

      - name: avg_pm25
        description: Mean daily PM2.5 avg across station-days in this bucket (µg/m³, 2 dp)

      - name: p95_pm25
        description: 95th-percentile daily PM2.5 avg in this bucket (µg/m³, 2 dp)

  - name: mart_pollutant_ratio
    description: >
      Daily PM2.5 / PM10 ratio per station — pollution source indicator.
      Grain: one row per location_id × measurement_date.
      Source: mart_daily_air_quality pivoted via conditional aggregation.
      Outlier station 6273386 excluded.
      Answers: "Is Hanoi PM2.5 driven by combustion (traffic/biomass) or crustal dust?"

    tests:
      - dbt_utils.unique_combination_of_columns:
          arguments:
            combination_of_columns:
              - location_id
              - measurement_date

    columns:
      - name: location_id
        description: OpenAQ internal location identifier
        tests:
          - not_null

      - name: measurement_date
        description: Calendar date
        tests:
          - not_null

      - name: location_name
        description: Canonical station name

      - name: city
        description: City (Hanoi or Ho Chi Minh City)

      - name: province
        description: Province / administrative division

      - name: pm25_avg
        description: Daily mean PM2.5 (µg/m³, 4 dp); NULL if station reported no PM2.5

      - name: pm10_avg
        description: Daily mean PM10 (µg/m³, 4 dp); NULL if station reported no PM10

      - name: pm25_pm10_ratio
        description: >
          pm25_avg / pm10_avg (4 dp). NULL when either pollutant is missing or PM10 = 0.
          Physically bounded [0, 1] for well-calibrated sensors.

      - name: source_indicator
        description: >
          Pollution source type inferred from PM2.5/PM10 ratio:
          'combustion-dominated' (ratio > 0.7) — traffic exhaust, biomass burning;
          'mixed' (0.4–0.7) — mixture of combustion and resuspended dust;
          'crustal/dust' (< 0.4) — road dust, construction, soil resuspension.
          NULL when ratio cannot be computed.
