version: 2

models:
  - name: mart_daily_air_quality
    description: >
      Daily average air quality per station and pollutant.
      Grain: one row per measurement_date × location_id × parameter.
      Partitioned by measurement_date.

    tests:
      - dbt_utils.unique_combination_of_columns:
          arguments:
            combination_of_columns:
              - measurement_date
              - location_id
              - parameter

    columns:
      - name: measurement_date
        description: Calendar date of the aggregated readings (partition key)
        tests:
          - not_null

      - name: city
        description: City where the station is located (Hanoi or Ho Chi Minh City)
        tests:
          - not_null

      - name: province
        description: Province / administrative division

      - name: parameter
        description: Pollutant code (pm25, pm10, o3, no2, so2, co, bc, etc.)
        tests:
          - not_null

      - name: location_id
        description: OpenAQ internal location identifier
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('vn_stations')
                field: location_id

      - name: location_name
        description: Canonical station name from vn_stations seed

      - name: station_lat
        description: Canonical WGS-84 latitude from vn_stations seed

      - name: station_lon
        description: Canonical WGS-84 longitude from vn_stations seed

      - name: avg_value
        description: Daily mean concentration (rounded to 4 dp)
        tests:
          - not_null

      - name: max_value
        description: Daily maximum concentration (rounded to 4 dp)

      - name: min_value
        description: Daily minimum concentration (rounded to 4 dp)

      - name: reading_count
        description: Number of valid readings contributing to the daily aggregate
        tests:
          - not_null

      - name: sensor_count
        description: Number of distinct sensors contributing to the daily aggregate

      - name: sensor_type
        description: >
          Instrument type: 'reference' for FEM monitors, 'low_cost' for AirGradient
          optical sensors. Enables dashboard filtering by instrument quality.

      - name: aqi_value
        description: >
          US EPA 2024 AQI (0–500) computed from avg_value via piecewise linear
          interpolation. NULL for non-PM2.5 parameters. Breakpoints: Good 0–50
          (0–9 µg/m³), Moderate 51–100 (9.1–35.4), USG 101–150 (35.5–55.4),
          Unhealthy 151–200 (55.5–125.4), Very Unhealthy 201–300 (125.5–225.4),
          Hazardous 301–500 (225.5–325.4).

      - name: aqi_category
        description: >
          AQI category label corresponding to aqi_value. One of: Good, Moderate,
          Unhealthy for Sensitive Groups, Unhealthy, Very Unhealthy, Hazardous.
          NULL for non-PM2.5 parameters.

      - name: exceeds_who_24h
        description: >
          TRUE when avg_value > 15 µg/m³ (WHO AQG 2021 24-hour guideline).
          NULL for non-PM2.5 parameters.

      - name: exceeds_qcvn
        description: >
          TRUE when avg_value > 50 µg/m³ (QCVN 05:2023 Vietnam 24-hour standard).
          NULL for non-PM2.5 parameters.

      - name: who_compliant_day
        description: >
          1 if PM2.5 daily avg ≤ 15 µg/m³ (WHO AQG compliant), 0 otherwise.
          NULL for non-PM2.5 parameters. Summed in mart_health_summary.

      - name: cigarette_equivalent
        description: >
          PM2.5 daily avg / 22.0 µg/m³ — cigarettes per day equivalent exposure
          (Berkeley Earth / aqi.in standard). NULL for non-PM2.5 parameters.

      - name: is_outlier_station
        description: >
          1 for stations with confirmed calibration/initialisation artefacts
          (currently station 6273386 — VNUHCMUS Campus 1, HCMC). 0 otherwise.
          Sourced from vn_stations seed. Downstream marts filter WHERE = 0.

      - name: corrected_pm25
        description: >
          Bias-corrected PM2.5 for low-cost optical sensors (PMS5003 family).
          Uses the EPA/Jayaratne humidity-adjusted formula:
            corrected = avg_value / (1 + 0.24 × RH_fraction)
          Falls back to RH=70% when no humidity data exists for that station-day.
          For reference stations, corrected_pm25 = avg_value (no correction applied).
          NULL for non-PM2.5 parameters.

  - name: mart_daily_aqi
    description: >
      Composite AQI per station per day — the maximum individual-pollutant AQI
      across all parameters reported for that station.
      Grain: one row per measurement_date × location_id.
      Partitioned by measurement_date.

    tests:
      - dbt_utils.unique_combination_of_columns:
          arguments:
            combination_of_columns:
              - measurement_date
              - location_id

    columns:
      - name: measurement_date
        description: Calendar date (partition key)
        tests:
          - not_null

      - name: location_id
        description: OpenAQ internal location identifier
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('vn_stations')
                field: location_id

      - name: location_name
        description: Canonical station name from vn_stations seed

      - name: city
        description: City (Hanoi or Ho Chi Minh City)
        tests:
          - not_null

      - name: province
        description: Province / administrative division

      - name: station_lat
        description: Canonical WGS-84 latitude

      - name: station_lon
        description: Canonical WGS-84 longitude

      - name: sensor_type
        description: Instrument type — 'reference' or 'low_cost'

      - name: composite_aqi
        description: Maximum individual-pollutant AQI for this station on this date
        tests:
          - not_null

      - name: dominant_pollutant
        description: Parameter (pm25, pm10) that produced the composite AQI
        tests:
          - not_null

      - name: health_category
        description: >
          AQI health category label for the composite AQI. One of: Good, Moderate,
          Unhealthy for Sensitive Groups, Unhealthy, Very Unhealthy, Hazardous.
        tests:
          - not_null

      - name: pm25_avg
        description: >
          PM2.5 daily average (µg/m³) for context. NULL if the station reported
          no PM2.5 measurements on that date.

      - name: cigarette_equivalent
        description: >
          pm25_avg / 22.0 — cigarettes per day equivalent (Berkeley Earth standard).
          NULL if pm25_avg is NULL.

  - name: mart_health_summary
    description: >
      Annual health day counts and WHO compliance per city.
      Grain: one row per city × year.
      Aggregates mart_daily_air_quality at the city level (mean across all reference
      stations) to avoid double-counting multi-station cities like Hanoi (16 stations).

    tests:
      - dbt_utils.unique_combination_of_columns:
          arguments:
            combination_of_columns:
              - city
              - year

    columns:
      - name: city
        description: City name
        tests:
          - not_null

      - name: province
        description: Province / administrative division

      - name: year
        description: Calendar year (integer)
        tests:
          - not_null

      - name: total_days
        description: Number of days with at least one PM2.5 measurement in this city/year
        tests:
          - not_null

      - name: good_days
        description: Days where city-level PM2.5 AQI category was Good (avg ≤ 9.0 µg/m³)

      - name: moderate_days
        description: Days where city-level AQI category was Moderate

      - name: usg_days
        description: Days where city-level AQI category was Unhealthy for Sensitive Groups

      - name: unhealthy_days
        description: Days where city-level AQI category was Unhealthy

      - name: very_unhealthy_days
        description: Days where city-level AQI category was Very Unhealthy

      - name: hazardous_days
        description: Days where city-level AQI category was Hazardous

      - name: who_compliant_days
        description: Days where city-level PM2.5 avg ≤ 15 µg/m³ (WHO AQG 2021)

      - name: who_compliance_pct
        description: who_compliant_days / total_days × 100 (rounded to 1 dp)
        tests:
          - not_null

      - name: avg_pm25
        description: Mean daily PM2.5 city average across the year (µg/m³, 1 dp)

      - name: avg_cigarette_equivalent
        description: Mean daily cigarette equivalent across the year (2 dp)

      - name: max_pm25
        description: Peak daily PM2.5 city average in the year (µg/m³, 1 dp)

      - name: risk_label
        description: >
          WHO compliance risk tier: Low (≥80%), Moderate (50–79%), High (20–49%),
          Extreme (<20%). Used as a headline KPI in the dashboard.
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['Low', 'Moderate', 'High', 'Extreme']

  - name: mart_diurnal_profile
    description: >
      Average pollutant concentration by hour of day (Vietnam local time, UTC+7).
      Grain: one row per location_id × parameter × hour_of_day × day_type × season.
      Drives the rush-hour line chart (weekday vs weekend × monsoon season) in the dashboard.
      is_outlier_station is exposed so consumers can filter out artefact stations.

    tests:
      - dbt_utils.unique_combination_of_columns:
          arguments:
            combination_of_columns:
              - location_id
              - parameter
              - hour_of_day
              - day_type
              - season

    columns:
      - name: location_id
        description: OpenAQ internal location identifier
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('vn_stations')
                field: location_id

      - name: location_name
        description: Canonical station name

      - name: city
        description: City (Hanoi or Ho Chi Minh City)
        tests:
          - not_null

      - name: province
        description: Province / administrative division

      - name: sensor_type
        description: Instrument type — 'reference' or 'low_cost'

      - name: is_outlier_station
        description: 1 for stations with confirmed calibration artefacts (station 6273386); 0 otherwise. Filter WHERE = 0 to exclude outlier data.

      - name: parameter
        description: Pollutant code
        tests:
          - not_null

      - name: hour_of_day
        description: Local hour (0–23, UTC+7, no DST)
        tests:
          - not_null

      - name: day_type
        description: >
          'Weekday' (Mon–Fri) or 'Weekend' (Sat–Sun). Traffic-driven rush-hour
          peaks are significantly attenuated on weekends.
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['Weekday', 'Weekend']

      - name: season
        description: >
          Vietnam meteorological season: 'NE Monsoon (Nov-Mar)', 'Transition (Apr-May)',
          'SW Monsoon (Jun-Sep)', or 'Transition (Oct)'.
        tests:
          - not_null

      - name: avg_value
        description: Mean concentration for this station/parameter/hour across all dates
        tests:
          - not_null

      - name: max_value
        description: Maximum concentration recorded in this hour bucket

      - name: min_value
        description: Minimum concentration recorded in this hour bucket

      - name: reading_count
        description: Number of individual measurements in this hour bucket

  - name: mart_monthly_profile
    description: >
      Average pollutant concentration by month of year.
      Grain: one row per location_id × parameter × month_of_year (1–12).
      Drives the seasonal bar/line chart and hour × month heatmap in the dashboard.
      is_outlier_station is exposed so consumers can filter out artefact stations.

    tests:
      - dbt_utils.unique_combination_of_columns:
          arguments:
            combination_of_columns:
              - location_id
              - parameter
              - month_of_year

    columns:
      - name: location_id
        description: OpenAQ internal location identifier
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('vn_stations')
                field: location_id

      - name: location_name
        description: Canonical station name

      - name: city
        description: City (Hanoi or Ho Chi Minh City)
        tests:
          - not_null

      - name: province
        description: Province / administrative division

      - name: sensor_type
        description: Instrument type — 'reference' or 'low_cost'

      - name: is_outlier_station
        description: 1 for stations with confirmed calibration artefacts (station 6273386); 0 otherwise. Filter WHERE = 0 to exclude outlier data.

      - name: parameter
        description: Pollutant code
        tests:
          - not_null

      - name: month_of_year
        description: Calendar month (1 = January, 12 = December)
        tests:
          - not_null

      - name: season
        description: >
          Vietnam meteorological season derived from month_of_year: 'NE Monsoon (Nov-Mar)',
          'Transition (Apr-May)', 'SW Monsoon (Jun-Sep)', or 'Transition (Oct)'.
          Deterministic from month — no grain change.
        tests:
          - not_null

      - name: avg_value
        description: Mean concentration for this station/parameter/month across all years
        tests:
          - not_null

      - name: max_value
        description: Maximum concentration recorded in this month bucket

      - name: min_value
        description: Minimum concentration recorded in this month bucket

      - name: p95_value
        description: 95th-percentile concentration (approx) for this month bucket

      - name: reading_count
        description: Number of individual measurements in this month bucket

      - name: day_count
        description: Number of distinct calendar dates contributing to this month bucket

  - name: mart_exceedance_stats
    description: >
      Monthly WHO and QCVN exceedance counts and rates per city and pollutant.
      Grain: one row per city × parameter × year × month_of_year.
      Source: mart_daily_air_quality (outlier station 6273386 excluded).
      Answers: "Is the WHO exceedance rate in Hanoi getting worse each January?"

    tests:
      - dbt_utils.unique_combination_of_columns:
          arguments:
            combination_of_columns:
              - city
              - parameter
              - year
              - month_of_year

    columns:
      - name: city
        description: City name (Hanoi or Ho Chi Minh City)
        tests:
          - not_null

      - name: parameter
        description: Pollutant code (pm25 only in this mart)
        tests:
          - not_null

      - name: year
        description: Calendar year (integer)
        tests:
          - not_null

      - name: month_of_year
        description: Calendar month (1–12)
        tests:
          - not_null

      - name: total_days
        description: Total station-days with PM2.5 readings in this city/year/month
        tests:
          - not_null

      - name: who_exceedance_days
        description: Days where city-level PM2.5 avg > 15 µg/m³ (WHO AQG 2021)

      - name: qcvn_exceedance_days
        description: Days where city-level PM2.5 avg > 50 µg/m³ (QCVN 05:2023)

      - name: who_exceedance_rate
        description: who_exceedance_days / total_days × 100 (rounded to 1 dp)

      - name: qcvn_exceedance_rate
        description: qcvn_exceedance_days / total_days × 100 (rounded to 1 dp)

      - name: avg_pm25
        description: Mean daily PM2.5 avg across station-days in this bucket (µg/m³, 2 dp)

      - name: p95_pm25
        description: 95th-percentile daily PM2.5 avg in this bucket (µg/m³, 2 dp)

  - name: mart_pollutant_ratio
    description: >
      Daily PM2.5 / PM10 ratio per station — pollution source indicator.
      Grain: one row per location_id × measurement_date.
      Source: mart_daily_air_quality pivoted via conditional aggregation.
      Outlier station 6273386 excluded.
      Answers: "Is Hanoi PM2.5 driven by combustion (traffic/biomass) or crustal dust?"

    tests:
      - dbt_utils.unique_combination_of_columns:
          arguments:
            combination_of_columns:
              - location_id
              - measurement_date

    columns:
      - name: location_id
        description: OpenAQ internal location identifier
        tests:
          - not_null

      - name: measurement_date
        description: Calendar date
        tests:
          - not_null

      - name: location_name
        description: Canonical station name

      - name: city
        description: City (Hanoi or Ho Chi Minh City)

      - name: province
        description: Province / administrative division

      - name: pm25_avg
        description: Daily mean PM2.5 (µg/m³, 4 dp); NULL if station reported no PM2.5

      - name: pm10_avg
        description: Daily mean PM10 (µg/m³, 4 dp); NULL if station reported no PM10

      - name: pm25_pm10_ratio
        description: >
          pm25_avg / pm10_avg (4 dp). NULL when either pollutant is missing or PM10 = 0.
          Physically bounded [0, 1] for well-calibrated sensors.

      - name: source_indicator
        description: >
          Pollution source type inferred from PM2.5/PM10 ratio:
          'combustion-dominated' (ratio > 0.7) — traffic exhaust, biomass burning;
          'mixed' (0.4–0.7) — mixture of combustion and resuspended dust;
          'crustal/dust' (< 0.4) — road dust, construction, soil resuspension.
          NULL when ratio cannot be computed.

  - name: mart_annual_monthly_trend
    description: >
      City-level PM2.5 aggregated by year × month of year.
      Grain: one row per city × year × month_of_year.
      Source: mart_daily_air_quality (pm25, outlier station 6273386 excluded).
      City-level daily average (mean of all stations) computed first — same
      methodology as mart_health_summary — to avoid double-counting.
      Enables year-over-year comparison: "Is Jan 2025 worse than Jan 2024?"

    tests:
      - dbt_utils.unique_combination_of_columns:
          arguments:
            combination_of_columns:
              - city
              - year
              - month_of_year

    columns:
      - name: city
        description: City name (Hanoi or Ho Chi Minh City)
        tests:
          - not_null

      - name: province
        description: Province / administrative division

      - name: year
        description: Calendar year (integer)
        tests:
          - not_null

      - name: month_of_year
        description: Calendar month (1–12)
        tests:
          - not_null

      - name: total_days
        description: Number of days with PM2.5 data in this city/year/month
        tests:
          - not_null

      - name: avg_pm25
        description: Mean city-level PM2.5 daily average across the month (µg/m³, 2 dp)

      - name: max_pm25
        description: Peak daily city-level PM2.5 average in the month (µg/m³, 2 dp)

      - name: p95_pm25
        description: 95th-percentile daily city-level PM2.5 in the month (µg/m³, 2 dp)

      - name: who_exceedance_rate
        description: Percentage of days where city-level PM2.5 avg > 15 µg/m³ (%, 1 dp)

      - name: qcvn_exceedance_rate
        description: Percentage of days where city-level PM2.5 avg > 50 µg/m³ (%, 1 dp)

  - name: mart_daily_weather
    description: >
      Daily ERA5 weather aggregates per station from Open-Meteo Historical Archive.
      Grain: one row per location_id × measurement_date.
      Source: int_weather_enriched (hourly ERA5 reanalysis data).
      Includes derived inversion_risk and wet_scavenging flags used by mart_aq_weather_daily.

    tests:
      - dbt_utils.unique_combination_of_columns:
          arguments:
            combination_of_columns:
              - location_id
              - measurement_date

    columns:
      - name: location_id
        description: OpenAQ internal location identifier
        tests:
          - not_null

      - name: measurement_date
        description: Calendar date (partition key)
        tests:
          - not_null

      - name: location_name
        description: Canonical station name from vn_stations seed

      - name: city
        description: City (Hanoi or Ho Chi Minh City)
        tests:
          - not_null

      - name: province
        description: Province / administrative division

      - name: sensor_type
        description: Instrument type from vn_stations seed

      - name: avg_temperature_2m
        description: Daily mean 2 m temperature (°C, 4 dp)

      - name: max_temperature_2m
        description: Daily maximum 2 m temperature (°C, 4 dp)

      - name: min_temperature_2m
        description: Daily minimum 2 m temperature (°C, 4 dp)

      - name: avg_rh_2m
        description: Daily mean 2 m relative humidity (%, 2 dp)

      - name: max_rh_2m
        description: Daily maximum 2 m relative humidity (%, 2 dp)

      - name: min_rh_2m
        description: Daily minimum 2 m relative humidity (%, 2 dp)

      - name: avg_wind_speed
        description: Daily mean wind speed at 10 m (m/s, 4 dp)

      - name: avg_wind_dir
        description: Simple arithmetic mean of hourly wind directions (degrees). Not a circular mean — use with caution for prevailing-wind analysis.

      - name: calm_wind_hours
        description: Count of UTC hours where wind_speed < 2.0 m/s (stagnant conditions)

      - name: total_precipitation_mm
        description: Daily total precipitation (mm, 4 dp)

      - name: avg_surface_pressure_hpa
        description: Daily mean surface pressure (hPa, 2 dp)

      - name: avg_boundary_layer_height_m
        description: Daily mean planetary boundary layer height (m, 1 dp)

      - name: min_boundary_layer_height_m
        description: Daily minimum BLH (m, 1 dp) — captures morning inversion peak

      - name: reading_count_hours
        description: Number of hourly records (should equal 24 under normal conditions)

      - name: inversion_risk
        description: >
          1 if min_boundary_layer_height_m < 500 AND avg_wind_speed < 2.0 m/s,
          else 0. Indicates conditions favourable for pollutant accumulation.

      - name: wet_scavenging
        description: >
          1 if total_precipitation_mm > 5.0 mm/day, else 0.
          Indicates likely below-cloud PM2.5 washout.

  - name: mart_aq_weather_daily
    description: >
      Air quality (PM2.5) joined to ERA5 weather covariates, station × daily grain.
      Source: mart_daily_air_quality (pm25, outlier station 6273386 excluded)
      LEFT JOIN mart_daily_weather.
      Weather columns are NULL when the weather Lambda failed or ERA5 lag applies.
      Primary diagnostic mart for PM2.5 / meteorology correlation analysis.

    tests:
      - dbt_utils.unique_combination_of_columns:
          arguments:
            combination_of_columns:
              - location_id
              - measurement_date

    columns:
      - name: location_id
        description: OpenAQ internal location identifier
        tests:
          - not_null

      - name: measurement_date
        description: Calendar date (partition key)
        tests:
          - not_null

      - name: location_name
        description: Canonical station name

      - name: city
        description: City (Hanoi or Ho Chi Minh City)
        tests:
          - not_null

      - name: province
        description: Province / administrative division

      - name: sensor_type
        description: Instrument type (reference or low_cost)

      - name: avg_pm25
        description: Daily mean PM2.5 from mart_daily_air_quality (µg/m³, 4 dp)

      - name: max_pm25
        description: Daily maximum PM2.5 (µg/m³, 4 dp)

      - name: corrected_pm25
        description: EPA/Jayaratne humidity-adjusted PM2.5 for low-cost sensors (÷(1+0.24×RH)); equals avg_pm25 for reference stations

      - name: aqi_value
        description: US EPA 2024 AQI for PM2.5 (integer)

      - name: aqi_category
        description: AQI health category label

      - name: exceeds_who_24h
        description: True if avg_pm25 > 15 µg/m³ (WHO AQG 2021 24-hour guideline)

      - name: exceeds_qcvn
        description: True if avg_pm25 > 50 µg/m³ (QCVN 05:2023)

      - name: cigarette_equivalent
        description: PM2.5 expressed as cigarette-equivalent exposure (avg_pm25 / 22.0)

      - name: avg_temperature_2m
        description: Daily mean 2 m temperature (°C); NULL if weather unavailable

      - name: avg_rh_2m
        description: Daily mean relative humidity (%); NULL if weather unavailable

      - name: avg_wind_speed
        description: Daily mean wind speed (m/s); NULL if weather unavailable

      - name: total_precipitation_mm
        description: Daily precipitation total (mm); NULL if weather unavailable

      - name: avg_boundary_layer_height_m
        description: Daily mean BLH (m); NULL if weather unavailable

      - name: min_boundary_layer_height_m
        description: Daily minimum BLH (m) — morning inversion indicator; NULL if weather unavailable

      - name: inversion_risk
        description: 1 = shallow BLH + calm winds (pollutant accumulation conditions); NULL if weather unavailable

      - name: wet_scavenging
        description: 1 = daily precipitation > 5 mm (PM2.5 washout conditions); NULL if weather unavailable

  - name: mart_lagged_features
    description: >
      Autoregressive feature mart for predictive modelling (Phase 5 SARIMA/Prophet).
      Grain: one row per location_id × measurement_date (pm25 only, outlier excluded).
      Source: mart_aq_weather_daily + vn_holidays seed.
      Contains lag/rolling features, cyclical seasonality, calendar flags, weather
      covariates, and the supervised learning target pm25_next1.

    tests:
      - dbt_utils.unique_combination_of_columns:
          arguments:
            combination_of_columns:
              - location_id
              - measurement_date

    columns:
      - name: location_id
        description: OpenAQ internal location identifier
        tests:
          - not_null

      - name: measurement_date
        description: Calendar date (partition key)
        tests:
          - not_null

      - name: city
        description: City (Hanoi or Ho Chi Minh City)
        tests:
          - not_null

      - name: avg_pm25
        description: Current day's daily mean PM2.5 (µg/m³, 4 dp)

      - name: corrected_pm25
        description: EPA/Jayaratne humidity-adjusted PM2.5 for low-cost sensors (÷(1+0.24×RH))

      - name: pm25_lag1
        description: Previous day's avg_pm25 (µg/m³); NULL for first row of each station series

      - name: pm25_lag7
        description: avg_pm25 seven days prior; NULL for first 7 rows of series

      - name: pm25_lag30
        description: avg_pm25 thirty days prior; NULL for first 30 rows of series

      - name: pm25_roll7
        description: 7-day trailing mean of avg_pm25 (µg/m³, 4 dp)

      - name: pm25_roll30
        description: 30-day trailing mean of avg_pm25 (µg/m³, 4 dp)

      - name: month_sin
        description: sin(2π × month / 12) — cyclical month encoding (6 dp)

      - name: month_cos
        description: cos(2π × month / 12) — cyclical month encoding (6 dp)

      - name: day_of_week
        description: Day of week (1=Monday … 7=Sunday; Presto convention)

      - name: is_weekend
        description: 1 if day_of_week in (6, 7), else 0

      - name: is_holiday
        description: 1 if measurement_date matches a date in vn_holidays seed, else 0

      - name: is_tet_period
        description: 1 if measurement_date falls within the 7-day Tết holiday window, else 0

      - name: avg_rh_2m
        description: Daily mean relative humidity at 2 m (%); NULL if weather unavailable

      - name: avg_wind_speed
        description: Daily mean wind speed at 10 m (m/s); NULL if weather unavailable

      - name: total_precipitation_mm
        description: Daily total precipitation (mm); NULL if weather unavailable

      - name: inversion_risk
        description: 1 = shallow BLH + calm winds; NULL if weather unavailable

      - name: wet_scavenging
        description: 1 = daily precipitation > 5 mm; NULL if weather unavailable

      - name: pm25_next1
        description: >
          Next day's avg_pm25 (LEAD(1)) — supervised learning target.
          NULL for the last row in each station's time series.

  - name: mart_feature_stats
    description: >
      Feature quality validation report for mart_lagged_features.
      Grain: one row per location_id (station-level summary).
      Reports null counts per feature and Pearson correlations vs avg_pm25
      (current day) and pm25_next1 (target). Run after dbt build to verify
      acceptance criteria before Phase 5 model training.

    columns:
      - name: location_id
        description: OpenAQ internal location identifier
        tests:
          - not_null
          - unique

      - name: city
        description: City (Hanoi or Ho Chi Minh City)

      - name: location_name
        description: Canonical station name

      - name: total_rows
        description: Total row count for this station in mart_lagged_features

      - name: pm25_lag1_nulls
        description: Null count for pm25_lag1 (expected = 1)

      - name: pm25_lag7_nulls
        description: Null count for pm25_lag7 (expected = 7)

      - name: pm25_lag30_nulls
        description: Null count for pm25_lag30 (expected = 30)

      - name: corr_lag1_pm25
        description: Pearson r of pm25_lag1 vs avg_pm25 (expected 0.70–0.90)

      - name: corr_rh_pm25
        description: Pearson r of avg_rh_2m vs avg_pm25 (expected 0.20–0.45)

      - name: corr_wind_pm25
        description: Pearson r of avg_wind_speed vs avg_pm25 (expected −0.30–−0.10)

      - name: corr_precip_pm25
        description: Pearson r of total_precipitation_mm vs avg_pm25 (expected −0.25–−0.05)

      - name: corr_inv_pm25
        description: Pearson r of inversion_risk vs avg_pm25 (expected 0.15–0.35)

      - name: corr_lag1_next
        description: Pearson r of pm25_lag1 vs pm25_next1 (next-day forecast relevance)

      - name: mean_pm25
        description: Mean daily PM2.5 for this station over the full series (µg/m³)

      - name: series_start
        description: Earliest measurement_date in this station's feature series

      - name: series_end
        description: Latest measurement_date in this station's feature series

  - name: mart_forecast_accuracy
    description: >
      Rolling forecast error metrics for SARIMA and Prophet models (Phase 5.5).
      Grain: one row per location_id × model × forecast_date.
      Sources: openaq_mart.mart_daily_forecast (Lambda external Parquet table) +
               mart_daily_air_quality (actuals). Most-recent-generated_at forecast
               wins when multiple runs exist for the same forecast_date.
      Partitioned by forecast_date. NULL error columns for future dates not yet observed.

    tests:
      - dbt_utils.unique_combination_of_columns:
          arguments:
            combination_of_columns:
              - location_id
              - model
              - forecast_date

    columns:
      - name: location_id
        description: OpenAQ internal location identifier
        tests:
          - not_null

      - name: forecast_date
        description: The date being forecast (partition key)
        tests:
          - not_null

      - name: model
        description: Model type (currently 'sarima' only; Prophet was removed due to container build incompatibility)
        tests:
          - not_null
          - accepted_values:
              values: [sarima]

      - name: city
        description: City (Hanoi or Ho Chi Minh City)

      - name: generated_at
        description: Date the forecast was generated (most recent run for this forecast_date)

      - name: forecast_pm25
        description: Predicted daily mean PM2.5 (µg/m³)

      - name: forecast_aqi
        description: Predicted AQI derived from forecast_pm25 (US EPA 2024 breakpoints)

      - name: ci_lower_95
        description: 95% confidence interval lower bound (µg/m³)

      - name: ci_upper_95
        description: 95% confidence interval upper bound (µg/m³)

      - name: holdout_rmse
        description: 30-day holdout RMSE for this station × model from the Lambda invocation

      - name: actual_pm25
        description: Observed PM2.5 from mart_daily_air_quality; NULL for future forecast_dates

      - name: error
        description: forecast_pm25 − actual_pm25 (positive = over-forecast); NULL until observed

      - name: abs_error
        description: Absolute forecast error (|forecast_pm25 - actual_pm25|); NULL until observed

      - name: squared_error
        description: error²; NULL until observed; used for RMSE computation

      - name: rolling_rmse_7d
        description: >
          sqrt(avg(squared_error) over last 7 forecast dates) per station × model.
          NULL until sufficient observed rows exist in the window.

      - name: rolling_rmse_30d
        description: >
          sqrt(avg(squared_error) over last 30 forecast dates).
          CloudWatch alarm fires when this exceeds 25 µg/m³ for Hanoi SARIMA.

      - name: rolling_mae_30d
        description: avg(|error|) over last 30 forecast dates (µg/m³)

      - name: rolling_bias_30d
        description: >
          avg(error) over last 30 forecast dates.
          Positive = systematic over-forecast; negative = systematic under-forecast.
