name: openaq_transform
version: "1.0.0"
config-version: 2

profile: openaq_transform

model-paths:  ["models"]
test-paths:   ["tests"]
seed-paths:   ["seeds"]
macro-paths:  ["macros"]

target-path:  "target"
clean-targets: ["target", "dbt_packages"]

models:
  openaq_transform:
    staging:
      +materialized: view

    intermediate:
      # Materialized as table so the raw scan + seed join runs once per dbt
      # invocation rather than being re-executed for every mart that refs it.
      +materialized: table

    marts:
      +materialized: table
      +partitioned_by: ["measurement_date"]
      +s3_data_dir: "s3://openaq-pipeline-thanhtrung102/processed/"

