name: openaq_transform
version: "1.0.0"
config-version: 2

profile: openaq_transform

model-paths:  ["models"]
test-paths:   ["tests"]
seed-paths:   ["seeds"]

seeds:
  openaq_transform:
    +encoding: utf8
macro-paths:  ["macros"]

target-path:  "target"
clean-targets: ["target", "dbt_packages"]

models:
  openaq_transform:
    staging:
      +materialized: view

    intermediate:
      # Materialized as table so the raw scan + seed join runs once per dbt
      # invocation rather than being re-executed for every mart that refs it.
      +materialized: table

    marts:
      +materialized: table
      # No +partitioned_by default here: every mart re-declares partitioned_by
      # locally in its own config() (some use ['measurement_date'], some use [],
      # one uses ['forecast_date']), so a project-level default is never effective.
      # s3_data_dir is intentionally absent here — it is controlled by the
      # profile (profiles.yml dev/prod targets) via S3_DATA_DIR env var so that
      # each operator writes to their own bucket without editing this file.

