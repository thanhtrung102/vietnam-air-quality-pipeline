version: 0.2

# dbt transform buildspec — rebuilds all openaq_mart tables from raw/batch/.
#
# Runtime image: ghcr.io/dbt-labs/dbt-athena:1.10.0 (set in CodeBuild project)
# dbt-athena-community is pre-installed in the image — no pip install needed.
#
# Triggered by EventBridge Scheduler at 02:30 UTC daily, 90 minutes after
# batch_sync Lambda (01:00 UTC) has finished syncing the archive.
#
# Source: s3://<your-bucket>/codebuild-source.zip  (set by terraform local.bucket_name)
#   Re-upload when models or seeds change:
#     zip -r codebuild-source.zip . --exclude '.git/*' 'transform/dbt_packages/*'
#     aws s3 cp codebuild-source.zip s3://openaq-pipeline-<suffix>/

phases:
  install:
    # dbt-athena is installed via pip on the AWS-managed CodeBuild image
    # (aws/codebuild/standard:7.0). We no longer use ghcr.io/dbt-labs/dbt-athena
    # (anonymous GHCR pulls are rate-limited from CodeBuild's shared NAT IPs ->
    # CannotPullImageManifestError).
    runtime-versions:
      python: 3.12
    commands:
      - python --version
      - pip install --quiet --upgrade pip
      - pip install --quiet dbt-athena-community
      - dbt --version
  pre_build:
    commands:
      # CodeBuild runs the buildspec from the dir containing it (transform/) when
      # the project buildspec path is transform/buildspec_dbt.yml, but runs from
      # the source root when invoked another way — cd only if not already there.
      - if [ -d transform ]; then cd transform; fi
      # Install dbt_utils package (packages.yml: dbt-labs/dbt_utils >=1.0.0)
      - dbt deps --profiles-dir . --project-dir .
      # NOTE: `dbt source freshness` is intentionally NOT run here. dbt-athena
      # computes source freshness from Glue table metadata (`last_modified`) and
      # returns it as a string, so it errors on every source regardless of actual
      # freshness (dbt-athena #631) — a gate that always warns is noise. Source
      # freshness is instead enforced by the singular test
      # tests/assert_batch_source_fresh.sql (query-based, runs in the post_build
      # `dbt test` step) plus the deployed DaysSinceLastNewMart CloudWatch alarm.

  build:
    commands:
      # Seeds before marts: vn_stations and vn_holidays are referenced by
      # int_measurements_enriched and mart_daily_aqi.
      - dbt seed --profiles-dir . --project-dir . --select vn_stations vn_holidays
      # Exclude bi_disabled marts: they feed only the disabled QuickSight layer or
      # the not-yet-deployed forecast table (mart_forecast_accuracy reads the
      # Lambda-written mart_daily_forecast). Re-include when those are enabled.
      - dbt run  --profiles-dir . --project-dir . --exclude tag:bi_disabled

  post_build:
    commands:
      # Non-blocking tests: failures appear in CloudWatch but don't fail the build.
      - dbt test --profiles-dir . --project-dir . --exclude tag:bi_disabled --store-failures || echo "WARN dbt tests had failures"
      - echo "dbt run complete at $(date -u)"
