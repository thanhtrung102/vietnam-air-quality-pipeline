<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Vietnam Air Quality Dashboard</title>

  <!-- Leaflet -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #0f172a;
      color: #e2e8f0;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    header {
      padding: 12px 20px;
      background: #1e293b;
      border-bottom: 1px solid #334155;
      display: flex;
      align-items: center;
      gap: 16px;
      flex-shrink: 0;
    }

    header h1 { font-size: 1.1rem; font-weight: 600; color: #f1f5f9; }
    header .updated { font-size: 0.75rem; color: #94a3b8; margin-left: auto; }

    #map { flex: 1; }

    /* AQI Legend */
    .legend {
      background: rgba(15, 23, 42, 0.92);
      border: 1px solid #334155;
      border-radius: 8px;
      padding: 12px 16px;
      font-size: 0.78rem;
      line-height: 1.8;
      backdrop-filter: blur(4px);
    }

    .legend h4 {
      font-size: 0.82rem;
      font-weight: 600;
      color: #f1f5f9;
      margin-bottom: 6px;
    }

    .legend-row { display: flex; align-items: center; gap: 8px; }

    .legend-dot {
      width: 12px;
      height: 12px;
      border-radius: 50%;
      flex-shrink: 0;
      border: 1px solid rgba(255,255,255,0.25);
    }

    /* Station popup */
    .leaflet-popup-content-wrapper {
      background: #1e293b;
      color: #e2e8f0;
      border: 1px solid #334155;
      border-radius: 10px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.5);
    }

    .leaflet-popup-tip { background: #1e293b; }

    .popup-title {
      font-weight: 600;
      font-size: 0.9rem;
      margin-bottom: 6px;
      color: #f1f5f9;
    }

    .popup-aqi {
      font-size: 2rem;
      font-weight: 700;
      line-height: 1;
      margin-bottom: 4px;
    }

    .popup-category {
      font-size: 0.78rem;
      font-weight: 500;
      padding: 2px 8px;
      border-radius: 4px;
      display: inline-block;
      margin-bottom: 8px;
      color: #0f172a;
    }

    .popup-meta {
      font-size: 0.72rem;
      color: #94a3b8;
      line-height: 1.6;
    }

    .popup-meta span { color: #cbd5e1; }

    .popup-cig {
      font-size: 0.72rem;
      color: #fbbf24;
      margin: 4px 0 2px;
    }

    .sensor-badge {
      display: inline-block;
      font-size: 0.65rem;
      padding: 1px 6px;
      border-radius: 3px;
      background: #334155;
      color: #94a3b8;
      margin-top: 4px;
    }
  </style>
</head>
<body>

<header>
  <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#38bdf8" stroke-width="2">
    <path d="M12 2a7 7 0 0 1 7 7c0 5-7 13-7 13S5 14 5 9a7 7 0 0 1 7-7z"/>
    <circle cx="12" cy="9" r="2.5"/>
  </svg>
  <h1>Vietnam Air Quality — Station Map</h1>
  <span class="updated" id="updated-label">Loading…</span>
</header>

<div id="map"></div>

<script>
  // ── HTML escaping ────────────────────────────────────────────────────────────
  function escHtml(s) {
    if (s == null) return "";
    return String(s)
      .replace(/&/g, "&amp;")
      .replace(/</g, "&lt;")
      .replace(/>/g, "&gt;")
      .replace(/"/g, "&quot;")
      .replace(/'/g, "&#39;");
  }

  // ── Configuration ────────────────────────────────────────────────────────────
  // Replace with your API Gateway URL after deploying lambda/aqi_api.
  // For local dev, set to the path of a static geojson file.
  const API_URL = window.AQI_API_URL || "https://hewunk5h75.execute-api.ap-southeast-1.amazonaws.com/";

  const AQI_COLOURS = {
    "Good":                           "#00e400",
    "Moderate":                       "#ffff00",
    "Unhealthy for Sensitive Groups": "#ff7e00",
    "Unhealthy":                      "#ff0000",
    "Very Unhealthy":                 "#8f3f97",
    "Hazardous":                      "#7e0023",
  };

  // WHO / QCVN reference thresholds for tooltip context
  const THRESHOLDS = [
    { label: "WHO Annual AQG",  value:  5, colour: "#4ade80" },
    { label: "WHO 24h AQG",     value: 15, colour: "#60a5fa" },
    { label: "QCVN 05:2023",    value: 25, colour: "#fb923c" },
    { label: "WHO IT-1",        value: 35, colour: "#f87171" },
  ];

  // ── Map init ─────────────────────────────────────────────────────────────────
  const map = L.map("map", {
    center: [16.5, 106.5],   // centre on Vietnam
    zoom: 6,
    zoomControl: true,
  });

  L.tileLayer("https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png", {
    attribution: '© <a href="https://openstreetmap.org">OpenStreetMap</a> © <a href="https://carto.com">CARTO</a> | Data: <a href="https://openaq.org">OpenAQ</a>',
    subdomains: "abcd",
    maxZoom: 19,
  }).addTo(map);

  // ── Legend ───────────────────────────────────────────────────────────────────
  const legend = L.control({ position: "bottomright" });
  legend.onAdd = () => {
    const div = L.DomUtil.create("div", "legend");
    div.innerHTML = `<h4>US EPA AQI</h4>` +
      Object.entries(AQI_COLOURS).map(([cat, col]) =>
        `<div class="legend-row">
           <div class="legend-dot" style="background:${col}"></div>
           <span>${cat}</span>
         </div>`
      ).join("") +
      `<hr style="border-color:#334155;margin:8px 0"/>` +
      `<h4 style="margin-bottom:4px">PM2.5 Reference Lines</h4>` +
      THRESHOLDS.map(t =>
        `<div class="legend-row">
           <div class="legend-dot" style="background:${t.colour};border-radius:2px"></div>
           <span>${t.label} (${t.value} µg/m³)</span>
         </div>`
      ).join("");
    return div;
  };
  legend.addTo(map);

  // ── Data loading ─────────────────────────────────────────────────────────────
  function radiusForAqi(aqi) {
    if (aqi == null) return 10;
    if (aqi >= 201) return 20;
    if (aqi >= 151) return 17;
    if (aqi >= 101) return 14;
    if (aqi >= 51)  return 12;
    return 10;
  }

  function buildPopup(p) {
    const col = AQI_COLOURS[p.health_category] || "#cccccc";
    const pollutantLabel = escHtml((p.dominant_pollutant || "").replace("pm25","PM2.5").replace("pm10","PM10"));
    const pm25Line = p.pm25_avg != null
      ? `PM2.5: <span>${escHtml(p.pm25_avg)} µg/m³</span><br/>`
      : "";
    const cigLine = p.cigarette_equivalent != null
      ? `<div class="popup-cig" title="1 cigarette ≈ 22 µg/m³ PM2.5/day (Berkeley Earth)">🚬 ${escHtml(p.cigarette_equivalent)} cigarette${p.cigarette_equivalent === 1 ? "" : "s"}/day</div>`
      : "";
    return `
      <div class="popup-title">${escHtml(p.location_name)}</div>
      <div class="popup-aqi" style="color:${col}">${p.composite_aqi != null ? escHtml(p.composite_aqi) : "N/A"}</div>
      <div class="popup-category" style="background:${col}">${escHtml(p.health_category) || "Unknown"}</div>
      <div class="popup-meta">
        ${pm25Line}
        Dominant pollutant: <span>${pollutantLabel || "—"}</span><br/>
        City: <span>${escHtml(p.city)}</span><br/>
        Date: <span>${escHtml(p.measurement_date)}</span>
      </div>
      ${cigLine}
      <div class="sensor-badge">${p.sensor_type === "reference" ? "🔬 Reference-grade" : "📡 Low-cost sensor"}</div>
    `;
  }

  fetch(API_URL)
    .then(r => r.json())
    .then(data => {
      // Handle both direct GeoJSON and Lambda proxy response shapes
      const geojson = data.body ? JSON.parse(data.body) : data;

      document.getElementById("updated-label").textContent =
        geojson.updated_at ? `Data as of ${geojson.updated_at}` : "";

      (geojson.features || []).forEach(f => {
        const p = f.properties;
        const [lon, lat] = f.geometry.coordinates;
        const colour = p.colour || AQI_COLOURS[p.health_category] || "#cccccc";

        L.circleMarker([lat, lon], {
          radius: radiusForAqi(p.composite_aqi),
          fillColor: colour,
          color: "rgba(255,255,255,0.6)",
          weight: 1.5,
          fillOpacity: 0.85,
        })
          .bindPopup(buildPopup(p), { maxWidth: 240 })
          .addTo(map);
      });

      // Auto-fit bounds to stations
      if (geojson.features && geojson.features.length > 0) {
        const coords = geojson.features.map(f => [
          f.geometry.coordinates[1],
          f.geometry.coordinates[0],
        ]);
        map.fitBounds(L.latLngBounds(coords).pad(0.15));
      }
    })
    .catch(err => {
      console.error("Failed to load AQI data:", err);
      document.getElementById("updated-label").textContent = "Failed to load data";
    });
</script>
</body>
</html>
